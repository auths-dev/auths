[licenses]
# Minimum confidence threshold for license detection
confidence-threshold = 0.8

# Only these licenses are allowed — anything else (including GPL variants) is denied
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # MIT without attribution clause (more permissive than MIT)
    "MIT-0",
# Community Data License Agreement Permissive 2.0 (permissive, used by webpki-roots)
    "CDLA-Permissive-2.0",
    # OpenSSL License (permissive, FSF Free/Libre; pulled in by aws-lc-sys via rustls)
    "OpenSSL",
]

[bans]
multiple-versions = "warn"

deny = [
  { crate = "reqwest", wrappers = [
    "auths-infra-http",
    "auths-infra-rekor",
    "auths-api",
    "auths-cli",
    "auths-mcp-server",
    "auths-telemetry",
    "jsonschema",
    "auths-monitor",
    "auths-sdk",
    "auths-mcp-gateway",
    "murmur-relay",
  ], reason = "HTTP clients confined to adapter/binary layer (auths-monitor binary fetches checkpoints; auths-sdk reqwest is optional, behind the `mcp` feature; the mcp-gateway binary submits anchors to witness endpoints)" },

  # dialoguer is a terminal UX dependency — CLI only
  { crate = "dialoguer", wrappers = ["auths-cli"], reason = "interactive TUI confined to CLI" },

  # axum is an HTTP framework — adapter crates only
  { crate = "axum", wrappers = [
    "auths-infra-http",
    "auths-api",
    "auths-cli",
    "auths-core",
    "auths-mcp-server",
    "auths-pairing-daemon",
    "auths-scim-server",
    "auths-witness-node",
    "murmur-relay",
  ], reason = "HTTP framework confined to adapter/server crates (scim-server is the SCIM provisioning server; auth-server is the OAuth/OIDC server; witness-node is the consolidated witness HTTP service binary)" },

  # git2 must not be a production dependency of auths-sdk or auths-core
  { crate = "git2", wrappers = [
    "auths-storage",
    "auths-id",
    "auths-infra-git",
    "auths-cli",
    "auths-index",
    "auths-sdk",
    "auths-test-utils",
    "auths-api",
    "auths-rp",
    "auths-witness-node",
  ], reason = "git2 must stay in storage/adapter layer; auths-sdk and auths-api git2 are dev-deps only; auth-server uses git2 via the local-git identity resolver; auths-rp's git2 is the optional git-sync registry-fetch adapter (feature-gated off by default); witness-node uses git2 to sync the party registry (refs/auths/*) it fail-closes on" },
]

[advisories]
ignore = [
  # rsa Marvin Attack (RUSTSEC-2023-0071) — transitive via ssh-key v0.6;
  # no fix available until ssh-key upgrades to rsa v0.10+
  "RUSTSEC-2023-0071",
  # paste unmaintained (RUSTSEC-2024-0436) — transitive via rmcp; no safe upgrade available
  "RUSTSEC-2024-0436",
  # rmcp Streamable HTTP server DNS rebinding (RUSTSEC-2026-0189) — not exploitable
  # here: rmcp is used only by auths-mcp-gateway with the `transport-io` (stdio) and
  # `transport-child-process` features; the vulnerable Streamable HTTP server transport
  # is never enabled, and the advisory states stdio/child-process transports are
  # unaffected. The fix (rmcp >= 1.4.0) is a major upgrade from our pinned 0.9 with no
  # security benefit for this transport posture.
  "RUSTSEC-2026-0189",
]

[sources]
# fn-128.T9: tighten from warn → deny. Only pull from the official
# crates.io registry; deny ad-hoc git deps and private registries unless
# explicitly allowlisted with a documented rationale.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[graph]
# Check every target we build for. Prevents a config that is green on
# x86_64 but pulls a GPL transitive on aarch64.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
]
