# Cross.toml — configuration for the `cross` cross-compilation tool.
# https://github.com/cross-rs/cross
#
# `cross` runs cargo inside a Docker container that includes the target
# sysroot. By default the container does not include OpenSSL dev headers,
# which some transitive deps (e.g. openssl-sys via git2 or reqwest) need.
# `pre-build` runs inside the container before cargo, so we can apt-install
# whatever the build needs for that target.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y --no-install-recommends libssl-dev:arm64 pkg-config",
]
