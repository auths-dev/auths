# One witness node, all three roles, from the published image.
# Pin `image` to a digest in production — the tag is here for local quickstart.
services:
  witness:
    image: ghcr.io/auths-dev/auths-witness-node:latest
    # Production: pin the digest so "runs anywhere" is reproducible, e.g.
    #   image: ghcr.io/auths-dev/auths-witness-node@sha256:<digest>
    command:
      - serve
      - --roles
      - kel,cosign,anchor
      - --bind
      - 0.0.0.0:3333
      - --anchor-store
      - /data/anchors.db
    read_only: true
    ports:
      - "3333:3333"
    environment:
      # First-boot identity: a 32-byte hex seed. Generate once and keep stable
      # across restarts (`openssl rand -hex 32`). The node mints its witness
      # identity from this on first boot.
      WITNESS_SEED: "${WITNESS_SEED}"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "/usr/local/bin/witness-node", "healthcheck", "--url", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
