# One witness node serving all three roles, from the published image.
# Pin `image` to a digest in production — the tag is here for local quickstart.
services:
  witness:
    image: ghcr.io/auths-dev/auths-witness-node:latest
    # Production: pin the digest so "runs anywhere" is reproducible, e.g.
    #   image: ghcr.io/auths-dev/auths-witness-node@sha256:<digest>
    command:
      - serve
      - --roles
      - anchor,kel,cosign
      - --bind
      - 0.0.0.0:3333
      - --data-dir
      - /data
      - --registry
      - /registry
      - --witness-name
      - "${WITNESS_NAME:-witness}"
    ports:
      - "3333:3333"
    environment:
      # The witness identity seed (64 hex chars). Generate once and keep stable
      # across restarts (`openssl rand -hex 32`) — cosignatures and the log
      # checkpoint key both derive from it, so a changed seed is a new witness.
      WITNESS_SEED: "${WITNESS_SEED}"
    volumes:
      # DURABLE, never tmpfs: the per-seed anchor store is the node's
      # anti-equivocation memory — an amnesiac witness will co-sign a fork
      # after a restart.
      - witness-data:/data
      # The operator-synced local copy of the parties' public identity
      # registry, used to resolve current keys for party signatures.
      #
      # First boot has no registry yet: default to ./registry beside this file,
      # and sync the parties' public registry into it before anchoring — with
      # the same image, so no host tooling is needed:
      #   docker compose run --rm witness \
      #     sync-registry --from <party-registry-url> --registry /registry
      # This fetches `refs/auths/*` (a plain `git clone` brings only
      # `refs/heads/*`, so the party KELs never arrive). Re-run it to pick up
      # new/rotated parties. A fresh witness boots fine on an empty registry and
      # grows as it receipts events — but the anchor role can only resolve a
      # party's keys once that party is in here, so sync before you expect to
      # accept their anchors (an un-synced anchor read just 404s that seed, it
      # doesn't crash). Mounted read-write so the sync step can populate it in
      # place; `serve` only reads from it.
      - ${WITNESS_REGISTRY:-./registry}:/registry
    healthcheck:
      test: ["CMD", "/usr/local/bin/witness-node", "healthcheck", "--url", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  witness-data:
