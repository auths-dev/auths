apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-witness
  labels:
    app.kubernetes.io/name: auths-witness-node
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auths-witness-node
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.bind.port }}
      targetPort: http
