apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-anchor-store
  labels:
    app.kubernetes.io/name: auths-witness-node
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce            # single-writer: the CAS store must not fan out
  resources:
    requests:
      storage: {{ .Values.anchorStore.size }}
  {{- if .Values.anchorStore.storageClass }}
  storageClassName: {{ .Values.anchorStore.storageClass }}
  {{- end }}
