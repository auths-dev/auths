apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-witness
  labels:
    app.kubernetes.io/name: auths-witness-node
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate            # single-writer anchor store — never two writers
  selector:
    matchLabels:
      app.kubernetes.io/name: auths-witness-node
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auths-witness-node
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
      containers:
        - name: witness
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --roles
            - {{ join "," .Values.roles | quote }}
            - --bind
            - "0.0.0.0:{{ .Values.bind.port }}"
            - --anchor-store
            - /data/anchors.db
          env:
            - name: WITNESS_SEED
              {{- if .Values.seed.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seed.existingSecret }}
                  key: WITNESS_SEED
              {{- else }}
              value: {{ .Values.seed.value | quote }}
              {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.bind.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: anchor-store
              mountPath: /data
      volumes:
        - name: anchor-store
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-anchor-store
