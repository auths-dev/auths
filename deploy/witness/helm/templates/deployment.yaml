apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-witness
  labels:
    app.kubernetes.io/name: auths-witness-node
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate            # single-writer anchor store — never two writers
  selector:
    matchLabels:
      app.kubernetes.io/name: auths-witness-node
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auths-witness-node
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        # The node's data dir IS the mounted PVC, and a freshly-attached volume
        # mounts root-owned — so the node runs as root to own its state, exactly
        # as the Dockerfile, compose, and fly do (see fly/README.md). Setting
        # runAsNonRoot without an fsGroup that owns the PVC CrashLoops the node
        # the moment it writes /data; the pod is the isolation boundary and the
        # node exposes only HTTP. If you require non-root, add an fsGroup here
        # and rebuild the image with a matching user.
        runAsUser: 0
      initContainers:
        # Fetch the parties' public registry (`refs/auths/*`) into the volume
        # before the node serves. A fresh witness boots fine without this and
        # grows as it receipts events — but the anchor role can only resolve a
        # party's keys once that party is in the registry, so sync first if this
        # node is expected to anchor for them. Re-runs on every pod start.
        - name: sync-registry
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - sync-registry
            - --from
            - {{ required "registry.url is required — the parties' public registry to fetch refs/auths/* from" .Values.registry.url | quote }}
            - --registry
            - /registry
          volumeMounts:
            - name: registry
              mountPath: /registry
      containers:
        - name: witness
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --roles
            - {{ join "," .Values.roles | quote }}
            - --bind
            - "0.0.0.0:{{ .Values.bind.port }}"
            - --data-dir
            - /data
            - --registry
            - /registry
            - --witness-name
            - {{ .Values.witnessName | quote }}
          env:
            - name: WITNESS_SEED
              {{- if .Values.seed.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seed.existingSecret }}
                  key: WITNESS_SEED
              {{- else }}
              value: {{ .Values.seed.value | quote }}
              {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.bind.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: anchor-store
              mountPath: /data
            - name: registry
              mountPath: /registry
              readOnly: true
      volumes:
        - name: anchor-store
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-anchor-store
        # Derived data (re-fetched by the init container each start), so it
        # rides an emptyDir — only the anchor store must be durable.
        - name: registry
          emptyDir: {}
