name: Express middleware

on:
  push:
    branches: [main]
    paths:
      - 'packages/auths-express/**'
      - '.github/workflows/express-middleware.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/auths-express/**'
      - '.github/workflows/express-middleware.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        # Pinned to match the repo's packageManager field and local dev (pnpm 11
        # drops the package.json `pnpm` field and changes build-script approval).
        run: npm install -g pnpm@10.27.0

      - name: Install dependencies
        working-directory: packages/auths-express
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/auths-express
        run: pnpm build

      - name: Test
        working-directory: packages/auths-express
        run: pnpm test
