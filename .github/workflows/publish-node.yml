name: Publish Node SDK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - npm
          - dry-run
        default: dry-run

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — both archs build natively on arm64 runner
          - os: macos-latest
            target: aarch64-apple-darwin

          # Linux (glibc) — built inside the napi-rs debian images so the
          # binding links against an old-glibc baseline (AWS Lambda / Amazon
          # Linux ship glibc 2.34; ubuntu-latest's toolchain emits 2.38+ symbol
          # requirements that make the published binary unloadable there).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64

          # Windows — native runners per arch
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Remove rust-toolchain.toml
        shell: bash
        run: rm -f rust-toolchain.toml

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        if: ${{ !matrix.docker }}
        with:
          toolchain: "1.93"
          targets: ${{ matrix.target }}
          components: clippy,rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.27.0

      - name: Install dependencies
        working-directory: packages/auths-node
        run: pnpm install --frozen-lockfile

      - name: Build native module
        if: ${{ !matrix.docker }}
        working-directory: packages/auths-node
        env:
          RUSTUP_TOOLCHAIN: "1.93"
        run: |
          pnpm exec napi build --platform --release --target ${{ matrix.target }}
          node scripts/sync-conformance.mjs

      # The container reuses the host-installed node_modules from the mounted
      # workspace — running pnpm inside the image trips corepack's stale
      # registry-key verification, and `set -e` keeps any failure loud.
      - name: Build native module (docker, old-glibc baseline)
        if: ${{ matrix.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker }}
          options: --user 0:0 -v ${{ github.workspace }}:/build -w /build/packages/auths-node
          run: |
            set -e
            rustup toolchain install 1.93 --profile minimal
            rustup default 1.93
            rustup target add ${{ matrix.target }}
            rustc --version
            node_modules/.bin/napi build --platform --release --target ${{ matrix.target }}
            node scripts/sync-conformance.mjs
            ls auths.*.node

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/auths-node/auths.*.node

  test:
    name: Test (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bindings-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact: bindings-aarch64-unknown-linux-gnu
          - os: macos-latest
            artifact: bindings-aarch64-apple-darwin
          - os: windows-latest
            artifact: bindings-x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.27.0

      - name: Install dependencies
        working-directory: packages/auths-node
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/auths-node

      - name: Configure Git
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@auths.dev"

      - name: Run tests
        working-directory: packages/auths-node
        run: pnpm test

  publish:
    name: Publish to npm
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'npm')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install -g pnpm@10.27.0

      - name: Install dependencies
        working-directory: packages/auths-node
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          path: packages/auths-node/artifacts
          merge-multiple: true

      - name: Create npm platform directories
        working-directory: packages/auths-node
        run: npx napi create-npm-dirs

      - name: Move artifacts
        working-directory: packages/auths-node
        run: pnpm artifacts

      # Trusted publishing (OIDC): tokenless auth via this workflow's OIDC
      # identity against each package's trusted publisher on npmjs.com — no
      # NPM_TOKEN. Requires npm >= 11.5.1 (setup-node ships older) AND a trusted
      # publisher configured for @auths-dev/sdk and every @auths-dev/sdk-<platform>
      # package (napi publishes each platform package separately).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # A re-pushed tag re-fires this workflow; npm refuses republishing an
      # existing version, so an already-published version is a SKIP, not a failure.
      - name: Skip if this version is already on npm
        id: published
        working-directory: packages/auths-node
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@auths-dev/sdk@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@auths-dev/sdk@$VERSION already on npm — skipping republish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish platform packages
        if: steps.published.outputs.exists != 'true'
        working-directory: packages/auths-node
        run: npx napi prepublish -t npm --no-gh-release

      - name: Publish main package
        if: steps.published.outputs.exists != 'true'
        working-directory: packages/auths-node
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.target }}" = "dry-run" ]; then
            echo "Dry run - skipping publish"
            npm pack
          else
            npm publish --ignore-scripts --provenance --access public
          fi
