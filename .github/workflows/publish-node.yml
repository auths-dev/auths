name: Publish Node SDK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - npm
          - dry-run
        default: dry-run

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — both archs build natively on arm64 runner
          - os: macos-latest
            target: aarch64-apple-darwin

          # Linux (glibc) — native runners per arch
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          # Windows — native runners per arch
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Remove rust-toolchain.toml
        shell: bash
        run: rm -f rust-toolchain.toml

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          targets: ${{ matrix.target }}
          components: clippy,rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: packages/auths-node
        run: pnpm install

      - name: Build native module
        working-directory: packages/auths-node
        env:
          RUSTUP_TOOLCHAIN: "1.93"
        run: pnpm build -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: packages/auths-node/auths.*.node

  test:
    name: Test (${{ matrix.os }})
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: bindings-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact: bindings-aarch64-unknown-linux-gnu
          - os: macos-latest
            artifact: bindings-aarch64-apple-darwin
          - os: windows-latest
            artifact: bindings-x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: packages/auths-node
        run: pnpm install

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/auths-node

      - name: Configure Git
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@auths.dev"

      - name: Run tests
        working-directory: packages/auths-node
        run: pnpm test

  publish:
    name: Publish to npm
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'npm')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: packages/auths-node
        run: pnpm install

      - uses: actions/download-artifact@v4
        with:
          path: packages/auths-node/artifacts
          merge-multiple: true

      - name: Create npm platform directories
        working-directory: packages/auths-node
        run: npx napi create-npm-dirs

      - name: Move artifacts
        working-directory: packages/auths-node
        run: pnpm artifacts

      - name: Publish platform packages
        working-directory: packages/auths-node
        run: npx napi prepublish -t npm --no-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: packages/auths-node
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.target }}" = "dry-run" ]; then
            echo "Dry run - skipping publish"
            npm pack
          else
            npm publish --ignore-scripts --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
