name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'

permissions:
  contents: read

concurrency:
  # Cancel superseded in-progress runs on the same PR to save runner minutes;
  # never cancel a main-branch run (each pushed commit must be fully verified).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  version-sync:
    name: Package version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check package versions match the workspace version
        run: python3 scripts/releases/0_versions.py --check
      - name: Every publishable crate is in the release (or explicitly excluded)
        run: python3 scripts/releases/2_crates.py --validate

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: clippy
      # `fips`/`cnsa` are mutually exclusive (RT-012 compile_error! in
      # auths-crypto/src/provider.rs), so --all-features can't compile. Lint the
      # bulk workspace minus the five dual-provider crypto crates, then lint those
      # five under each provider separately.
      - run: cargo clippy --all-targets --all-features --workspace --exclude auths-crypto --exclude auths-core --exclude auths-keri --exclude auths-pairing-protocol --exclude auths-pairing-daemon -- -D warnings
      - run: cargo clippy --all-targets -p auths-crypto -p auths-core -p auths-keri -p auths-pairing-protocol -p auths-pairing-daemon --features fips -- -D warnings
      - run: cargo clippy --all-targets -p auths-crypto -p auths-core -p auths-keri -p auths-pairing-protocol -p auths-pairing-daemon --features cnsa -- -D warnings
      - run: cargo run -p xtask -- check-clippy-sync

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: rustfmt, clippy
      # Run the same hooks developers run locally, so a commit that passes local
      # hooks cannot fail CI on format/lint/hygiene drift. The workspace
      # cargo-fmt and cargo-clippy hooks run byte-identical commands in the
      # dedicated `fmt` and `clippy` jobs above (and the pre-push AST checks in
      # `xtask-checks`), so they are skipped here to avoid re-linting the whole
      # workspace a second time. Everything else — file hygiene, actionlint,
      # workflow-secret scan, SDK-boundary, and the packages/ fmt+clippy — runs
      # here and nowhere else.
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: cargo-fmt,cargo-clippy

  xtask-checks:
    name: Tree-sitter enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Run tree-sitter enforcement checks
        run: |
          cargo run -p xtask -- check-curve-agnostic
          cargo run -p xtask -- check-anchor-discipline
          cargo run -p xtask -- check-constant-time
          cargo run -p xtask -- check-rfc6979
          cargo run -p xtask -- check-admission-policy
          cargo run -p xtask -- check-command-drift
          cargo run -p xtask -- check-verify-path-completeness
          cargo run -p xtask -- check-binding-boundary
          cargo run -p xtask -- gen-error-docs --check
      - name: Architecture boundary checks
        run: |
          bash scripts/check-arch.sh
          bash scripts/check_sdk_boundary.sh
      - name: Crypto primitive inventory is current
        run: python3 scripts/check_primitive_inventory.py

  build-cli:
    name: Build CLI binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      # Build the debug binaries once and share them as an artifact so the smoke
      # and e2e jobs run against a prebuilt CLI instead of each recompiling it.
      # sccache already dedupes the compiles across jobs; the artifact additionally
      # lets those downstream jobs drop the Rust toolchain entirely.
      - name: Build auths CLI + MCP gateway
        run: cargo build --package auths-cli --package auths-mcp-gateway
      - name: Stage binaries
        run: |
          mkdir -p cli-bins
          cp target/debug/auths target/debug/auths-sign target/debug/auths-verify target/debug/auths-mcp-gateway cli-bins/
      - name: Upload CLI binaries
        uses: actions/upload-artifact@v4
        with:
          name: cli-bins-${{ matrix.os }}
          path: cli-bins/

  smoke:
    name: Golden-path smoke test
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-bins-ubuntu-latest
          path: cli-bins
      - name: Make binaries executable
        run: chmod +x cli-bins/*
      - name: Run golden-path smoke test
        run: python3 docs/smoketests/end_to_end.py
        env:
          AUTHS_BIN: ${{ github.workspace }}/cli-bins/auths
      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-last-run
          path: docs/smoketests/last_run.json

  schemas:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - name: Regenerate schemas and check for drift
        run: |
          cargo run -p xtask -- generate-schemas
          git diff --exit-code schemas/
      - name: Regenerate the verdict manifest and check for drift
        run: |
          cargo run -p xtask -- gen-contracts
          git diff --exit-code schemas/contracts-v1.json
      - name: Validate fixtures against schemas
        run: cargo run -p xtask -- validate-schemas

  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        # TODO: add os: [ubuntu-latest, macos-latest, windows-latest]
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install SoftHSMv2 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y softhsm2
          mkdir -p /tmp/softhsm/tokens
          echo "directories.tokendir = /tmp/softhsm/tokens" > /tmp/softhsm2.conf
          export SOFTHSM2_CONF=/tmp/softhsm2.conf
          softhsm2-util --init-token --slot 0 --label "auths-test" --pin 12345678 --so-pin 12345678
          echo "SOFTHSM2_CONF=/tmp/softhsm2.conf" >> "$GITHUB_ENV"

      - name: Install SoftHSMv2 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install softhsm
          mkdir -p /tmp/softhsm/tokens
          echo "directories.tokendir = /tmp/softhsm/tokens" > /tmp/softhsm2.conf
          export SOFTHSM2_CONF=/tmp/softhsm2.conf
          softhsm2-util --init-token --slot 0 --label "auths-test" --pin 12345678 --so-pin 12345678
          echo "SOFTHSM2_CONF=/tmp/softhsm2.conf" >> "$GITHUB_ENV"

      - name: Configure Git
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@auths.dev"

      - name: Install Go (Ubuntu, needed for aws-lc-fips-sys)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # `fips`/`cnsa` are mutually exclusive (RT-012), so --all-features can't
      # compile. Run the bulk workspace with --all-features minus the five
      # dual-provider crypto crates, then run those five under FIPS (the provider
      # this job has always exercised — aws-lc-rs needs the Go/CMake toolchain
      # installed above).
      # postgres_integration is excluded here — it needs a live Postgres and runs
      # in the dedicated `postgres-tests` job. Without a server it would spend the
      # sqlx acquire_timeout (30s) per test retrying a dead socket, then skip.
      - name: Run tests (Ubuntu — all features, crypto crates excluded)
        if: matrix.os == 'ubuntu-latest'
        run: cargo nextest run --workspace --all-features --no-fail-fast --exclude auths-crypto --exclude auths-core --exclude auths-keri --exclude auths-pairing-protocol --exclude auths-pairing-daemon -E 'not binary(postgres_integration)'
      - name: Run tests (Ubuntu — crypto crates under FIPS)
        if: matrix.os == 'ubuntu-latest'
        run: cargo nextest run -p auths-crypto -p auths-core -p auths-keri -p auths-pairing-protocol -p auths-pairing-daemon --features fips --no-fail-fast

      - name: Run tests (macOS — exclude FIPS, requires Go + Linux)
        if: matrix.os == 'macos-latest'
        run: cargo nextest run --workspace --features test-utils,witness-client --no-fail-fast

      - name: Run doc tests
        run: cargo test --all --doc

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-audit
      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

  postgres-tests:
    name: Postgres integration tests
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The harness reads these first (overriding its passwordless localhost
      # default): the admin URL provisions auths_registry_test, the test URL
      # connects to it. Service containers are Linux-only, so these tests get
      # their own ubuntu job rather than the cross-OS matrix — the macOS test leg
      # never enables backend-postgres, so it does not run them anyway.
      AUTHS_TEST_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      AUTHS_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/auths_registry_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run Postgres integration tests
        run: cargo nextest run -p auths-storage --features backend-postgres -E 'binary(postgres_integration)'

  # capsec-audit:
  #   name: Capability Audit
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     security-events: write
  #     pull-requests: write
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0
  #     - uses: dtolnay/rust-toolchain@stable
  #     - name: Audit clean crates (zero I/O expected)
  #       uses: bordumb/capsec-github-action@v1
  #       with:
  #         only: auths-crypto,auths-verifier,auths-policy,auths-keri
  #         fail-on: low
  #         upload-sarif: false
  #         comment-on-pr: false
  #     - name: Audit dirty crates (no new high-risk I/O)
  #       uses: bordumb/capsec-github-action@v1
  #       with:
  #         only: auths-core,auths-id
  #         fail-on: high
  #         diff: 'true'
  #         upload-sarif: true
  #         sarif-category: capsec-audit-dirty
  #         comment-on-pr: true

  pq-hybrid:
    name: PQ hybrid build (auths-pairing-protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      # fn-129.T10: exercise the experimental `pq-hybrid` feature. The
      # `ml-kem` crate is unaudited; we build and run its tests to freeze
      # the wire format + combiner ordering ahead of a security review.
      - name: Build with pq-hybrid feature
        run: cargo build -p auths-pairing-protocol --features pq-hybrid
      - name: Test with pq-hybrid feature
        run: cargo nextest run -p auths-pairing-protocol --features pq-hybrid --no-fail-fast
      - name: Clippy with pq-hybrid feature
        run: cargo clippy -p auths-pairing-protocol --features pq-hybrid --all-targets -- -D warnings -D unsafe_code

  msrv:
    name: MSRV check (1.93)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo check --workspace
  wasm:
    name: WASM build (auths-verifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM with wasm-pack
        working-directory: crates/auths-verifier
        run: wasm-pack build --target bundler --no-default-features --features wasm
      # Node 20+ provides the Web Crypto Ed25519 the async entrypoints exercise.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Pin the test runner to the wasm-bindgen version in Cargo.lock — the runtime
      # glue and the runner must match exactly.
      - name: Install wasm-bindgen-test-runner
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked
      - name: Execute the WASM verdict path under Node
        working-directory: crates/auths-verifier
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: cargo test --target wasm32-unknown-unknown --no-default-features --features wasm --test wasm_bindings

  fuzz-smoke:
    name: Fuzz targets build + smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: crates/auths-verifier/fuzz
            targets: verify_presentation_json verify_credential_json verify_chain attestation_parse did_parse
          - dir: crates/auths-keri/fuzz
            targets: fuzz_cesr_import fuzz_parse_cesr fuzz_validate_kel fuzz_receipt_couples fuzz_attachment_parse
    steps:
      - uses: actions/checkout@v4
      # cache: false — the fuzz build dir is ${{ matrix.dir }}/target, not the
      # workspace target Swatinem manages, so this job keeps its own matrix-keyed
      # cache below and only takes the toolchain + shared sccache from the composite.
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          cache: "false"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.dir }}/target
          key: ${{ runner.os }}-fuzz-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.dir }}
          restore-keys: ${{ runner.os }}-fuzz-
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Building is the anti-bit-rot guard (the targets must track the crate API); a
      # short run on each exercises the invariants — never accept a forgery, never panic.
      - name: Build fuzz targets
        working-directory: ${{ matrix.dir }}
        run: cargo +nightly fuzz build
      - name: Smoke-run each target
        working-directory: ${{ matrix.dir }}
        run: |
          for target in ${{ matrix.targets }}; do
            echo "::group::$target"
            cargo +nightly fuzz run "$target" -- -runs=20000
            echo "::endgroup::"
          done

  conformance:
    name: KERI conformance (keripy 1.3.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: astral-sh/setup-uv@v4
      # keripy's crypto (pysodium) loads libsodium via ctypes at runtime.
      - name: Install libsodium (keripy runtime dependency)
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev
      - name: Build auths CLI
        run: cargo build --package auths-cli
      # Drives the real auths binary against the keripy 1.3.4 reference for every
      # interop surface (ksn, did:webs, OOBI, IPEX) and fails the build on any
      # byte/structural divergence. uv installs the pinned keri==1.3.4 oracle.
      - name: Run keripy conformance gate
        working-directory: tests/conformance
        run: uv run pytest -v --junitxml=../../conformance-results.xml
        env:
          AUTHS_BIN: ${{ github.workspace }}/target/debug/auths
      # Differential the signed-KEL verdict against keripy's own ingestion path: the
      # Rust test shells out to python3, so run it under `uv run` (the conformance
      # venv puts keri 1.3.4 on PATH) with the live cross-check enabled. Without this
      # the cross-check is gated off and the reject cases are a self-oracle.
      - name: KEL-verdict differential vs keripy 1.3.4
        working-directory: tests/conformance
        env:
          KERIPY_INTEROP: "1"
          KERIPY_REQUIRED: "1"
        run: uv run cargo test --manifest-path ../../Cargo.toml -p auths-keri --test integration subprocess -- --nocapture
      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: conformance-results.xml

  e2e-tests:
    name: E2E Tests (${{ matrix.os }})
    needs: [test, build-cli]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      # Consume the prebuilt CLI + gateway from build-cli instead of recompiling.
      # Restoring them into target/debug keeps the AUTHS_*_BIN paths below and the
      # harness's target/debug fallback (for auths-mcp-gateway) unchanged.
      - name: Download auths binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-bins-${{ matrix.os }}
          path: target/debug
      - name: Make binaries executable
        run: chmod +x target/debug/auths target/debug/auths-sign target/debug/auths-verify target/debug/auths-mcp-gateway

      - name: Configure git
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@auths.dev"

      - name: Run E2E tests
        working-directory: tests/e2e
        run: uv run pytest -v --junitxml=../../results-${{ matrix.os }}.xml
        env:
          AUTHS_BIN: ${{ github.workspace }}/target/debug/auths
          AUTHS_SIGN_BIN: ${{ github.workspace }}/target/debug/auths-sign
          AUTHS_VERIFY_BIN: ${{ github.workspace }}/target/debug/auths-verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.os }}
          path: results-*.xml
