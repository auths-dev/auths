name: Verify Commits
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build the verifier from THIS checkout instead of downloading a pinned
      # release. The KEL/verification format moves between releases; a pinned
      # older `auths` cannot resolve a KEL that newer signing tooling produced
      # (the 0.1.4 "KEL not found" break was exactly this skew). Building from
      # source makes the verifier match the code that signed these commits, by
      # construction — there is no version to keep in sync.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.93"

      # Shared compiler cache: the release build reuses crates compiled by other
      # jobs/runs whose inputs match, layered on the Swatinem dependency cache below.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: verify-commits
          cache-on-failure: true

      - name: Build auths from source
        run: |
          cargo build --release --locked -p auths-cli
          echo "$GITHUB_WORKSPACE/target/release" >> "$GITHUB_PATH"

      - uses: auths-dev/verify@v1
        with:
          # No auths-version: the action uses the `auths` we just built and put
          # on PATH, so the verifier always matches this commit's own tooling.
          #
          # Stateless KEL-native verification: the committed identity bundle
          # carries the identity + authorization chain so the runner can verify
          # commit signatures without ~/.auths. Regenerate when keys rotate or
          # the bundle's TTL lapses:
          #   auths id export-bundle --alias main \
          #     --output .auths/ci-bundle.json --max-age-secs 31536000
          identity-bundle: .auths/ci-bundle.json
          fail-on-unsigned: true
          post-pr-comment: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
