name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
      - '.github/workflows/docs.yml'
      - 'crates/auths-cli/src/**'
      - 'crates/xtask/src/**'
      - 'packages/auths-python/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
      - 'crates/auths-cli/src/**'
      - 'crates/xtask/src/**'
      - 'packages/auths-python/**'

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-revision-date

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Regenerate CLI docs
        run: cargo run -p xtask -- gen-docs

      - name: Build rustdoc
        run: cargo doc --no-deps -p auths-sdk -p auths-core -p auths-crypto -p auths-verifier -p auths-id
        env:
          RUSTDOCFLAGS: "-D warnings"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs-material "mkdocstrings[python]"

      - name: Build docs (PR check)
        if: github.event_name == 'pull_request'
        run: mkdocs build --strict

      - name: Build mkdocs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mkdocs build --strict

      - name: Merge rustdoc into site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p site/rustdoc
          cp -r target/doc/* site/rustdoc/
          echo '<meta http-equiv="refresh" content="0; url=auths_sdk">' > site/rustdoc/index.html
          touch site/.nojekyll

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
