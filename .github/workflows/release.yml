# Usage:
# Set a tag, then push it to trigger the release workflow:
# git tag v0.1.0
# git push origin v0.1.0
#
# Prerequisites:
# - Commits must be signed by a maintainer listed in .auths/allowed_signers
# - No signing secrets needed — CI verifies commits, then signs artifacts with ephemeral keys

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit signatures
        uses: auths-dev/verify@c7bee200ff881005bd13bd67f514b57edbfd0500 # v1
        with:
          auths-version: '0.1.3'
          identity-bundle: .auths/ci-bundle.json

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # node_platform is `${process.platform}-${process.arch}` — the exact key
          # `@auths/mcp`'s launcher looks up under vendor/<platform>/, so the
          # standalone gateway asset drops straight into that tree with no mapping.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: auths-linux-x86_64
            node_platform: linux-x64
            ext: .tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: auths-linux-aarch64
            node_platform: linux-arm64
            ext: .tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: auths-macos-aarch64
            node_platform: darwin-arm64
            ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: auths-windows-x86_64
            node_platform: win32-x64
            ext: .zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.93"
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      # auths-mcp-gateway ships alongside the CLI: `@auths/mcp`'s launcher shells out
      # to this binary and its build step defers the binary to "a release-CI step",
      # which is this one. Without it the published launcher has nothing to run.
      - name: Build release binaries
        run: >
          cargo build --release --locked
          --package auths-cli
          --package auths-mcp-gateway
          --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.ext == '.tar.gz'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/auths staging/ || true
          cp target/${{ matrix.target }}/release/auths-sign staging/ || true
          cp target/${{ matrix.target }}/release/auths-verify staging/ || true
          # No `|| true`: a silently absent gateway is how it shipped to nobody.
          cp target/${{ matrix.target }}/release/auths-mcp-gateway staging/
          tar -czf ${{ matrix.asset_name }}${{ matrix.ext }} -C staging .

      - name: Package (Windows)
        if: matrix.ext == '.zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item target/${{ matrix.target }}/release/auths.exe staging/ -ErrorAction SilentlyContinue
          Copy-Item target/${{ matrix.target }}/release/auths-sign.exe staging/ -ErrorAction SilentlyContinue
          Copy-Item target/${{ matrix.target }}/release/auths-verify.exe staging/ -ErrorAction SilentlyContinue
          # No SilentlyContinue: a silently absent gateway is how it shipped to nobody.
          Copy-Item target/${{ matrix.target }}/release/auths-mcp-gateway.exe staging/
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.asset_name }}${{ matrix.ext }}

      # A standalone gateway asset, named by node platform, so `@auths/mcp` can drop
      # it straight into vendor/<platform>/ — either bundled at publish or fetched at
      # postinstall. The combined archive above is for `brew`/direct-download users;
      # this is for the npm launcher, which wants only the gateway.
      - name: Package MCP gateway standalone (Unix)
        if: matrix.ext == '.tar.gz'
        run: |
          ASSET="auths-mcp-gateway-${{ matrix.node_platform }}.tar.gz"
          tar -czf "$ASSET" -C target/${{ matrix.target }}/release auths-mcp-gateway
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Package MCP gateway standalone (Windows)
        if: matrix.ext == '.zip'
        shell: pwsh
        run: |
          $asset = "auths-mcp-gateway-${{ matrix.node_platform }}.zip"
          Compress-Archive -Path target/${{ matrix.target }}/release/auths-mcp-gateway.exe -DestinationPath $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"

      - name: Generate SHA256 checksum (Unix)
        if: matrix.ext == '.tar.gz'
        run: shasum -a 256 ${{ matrix.asset_name }}${{ matrix.ext }} > ${{ matrix.asset_name }}${{ matrix.ext }}.sha256

      - name: Generate SHA256 checksum (Windows)
        if: matrix.ext == '.zip'
        shell: pwsh
        run: |
          $hash = (Get-FileHash ${{ matrix.asset_name }}${{ matrix.ext }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}${{ matrix.ext }}" | Out-File -Encoding ascii ${{ matrix.asset_name }}${{ matrix.ext }}.sha256

      - name: Sign artifact and log to Sigstore (ephemeral, Unix)
        if: matrix.ext == '.tar.gz'
        run: |
          FILE="${{ matrix.asset_name }}${{ matrix.ext }}"
          ./staging/auths artifact sign "$FILE" \
            --ci \
            --commit "${{ github.sha }}" \
            --ci-platform github \
            --log sigstore-rekor \
            --note "Release ${{ github.ref_name }}"

      - name: Sign artifact and log to Sigstore (ephemeral, Windows)
        if: matrix.ext == '.zip'
        shell: pwsh
        run: |
          $file = "${{ matrix.asset_name }}${{ matrix.ext }}"
          .\staging\auths.exe artifact sign $file `
            --ci `
            --commit $env:GITHUB_SHA `
            --ci-platform github `
            --log sigstore-rekor `
            --note "Release ${{ github.ref_name }}"

      # The ephemeral attestation anchors HEAD, whose trust chain ends at the
      # maintainer's KEL. The repo publishes that KEL under refs/auths/registry
      # (KEL-native distribution) — seed the runner's ~/.auths so the verifier
      # can resolve it.
      - name: Seed maintainer registry for verification
        shell: bash
        run: |
          git init -q "$HOME/.auths"
          git -C "$HOME/.auths" fetch -q "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" 'refs/auths/*:refs/auths/*'
          git -C "$HOME/.auths" for-each-ref refs/auths/

      - name: Verify own attestation (Unix)
        if: matrix.ext == '.tar.gz'
        run: ./staging/auths artifact verify "${{ matrix.asset_name }}${{ matrix.ext }}"

      - name: Verify own attestation (Windows)
        if: matrix.ext == '.zip'
        shell: pwsh
        run: .\staging\auths.exe artifact verify "${{ matrix.asset_name }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}${{ matrix.ext }}
            ${{ matrix.asset_name }}${{ matrix.ext }}.sha256
            ${{ matrix.asset_name }}${{ matrix.ext }}.auths.json
            auths-mcp-gateway-${{ matrix.node_platform }}${{ matrix.ext }}
            auths-mcp-gateway-${{ matrix.node_platform }}${{ matrix.ext }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download attestations and extract hashes
        id: hashes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/auths-dev/auths/releases/download/v${VERSION}"
          for asset in auths-macos-aarch64 auths-linux-x86_64 auths-linux-aarch64; do
            curl -sL "${BASE}/${asset}.tar.gz.auths.json" -o "${asset}.auths.json"
          done
          extract_hash() { jq -r '.payload.digest.hex' "$1"; }
          {
            echo "version=${VERSION}"
            echo "macos_aarch64=$(extract_hash auths-macos-aarch64.auths.json)"
            echo "linux_x86_64=$(extract_hash auths-linux-x86_64.auths.json)"
            echo "linux_aarch64=$(extract_hash auths-linux-aarch64.auths.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: auths-dev/homebrew-auths-cli
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.hashes.outputs.version }}"
          cat > homebrew-tap/Formula/auths.rb << FORMULA
          class Auths < Formula
            desc "Cryptographic identity for developers — sign artifacts, replace API keys"
            homepage "https://auths.dev"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/auths-dev/auths/releases/download/v#{version}/auths-macos-aarch64.tar.gz"
                sha256 "${{ steps.hashes.outputs.macos_aarch64 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/auths-dev/auths/releases/download/v#{version}/auths-linux-x86_64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_x86_64 }}"
              end
              on_arm do
                url "https://github.com/auths-dev/auths/releases/download/v#{version}/auths-linux-aarch64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_aarch64 }}"
              end
            end

            def install
              bin.install "auths"
              bin.install "auths-sign" if File.exist?("auths-sign")
              bin.install "auths-verify" if File.exist?("auths-verify")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/auths --version")
            end
          end
          FORMULA

      # Direct push (no PR): pre-launch the tap has no review gate, and the
      # previous create-pull-request flow left formulas stale because nobody
      # merged the bot PRs.
      - name: Push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/auths.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "auths ${{ steps.hashes.outputs.version }}"
          git push origin main
