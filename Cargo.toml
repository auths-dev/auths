[workspace]
resolver = "3"
members = [
  "crates/auths",
  "crates/auths-core",
  "crates/auths-cli",
  "crates/auths-id",
  "crates/auths-index",
  "crates/auths-policy",
  "crates/auths-verifier",
  "crates/auths-telemetry",
  "crates/auths-crypto",
  "crates/auths-sdk",
  "crates/auths-infra-git",
  "crates/auths-infra-http",
  "crates/auths-storage",
  "crates/auths-keri",
  "crates/auths-oidc-bridge",
  "crates/xtask",
]
exclude = [
  "crates/auths-radicle",
]

[workspace.package]
version = "0.0.1-rc.6"
license = "Apache-2.0"
rust-version = "1.93"
repository = "https://github.com/auths-dev/auths"
homepage = "https://github.com/auths-dev/auths"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
bs58 = "0.5.1"
ring = "0.17.14"
base64 = "0.22.1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
git2 = "0.20.4"

auths-core = { path = "crates/auths-core", version = "0.0.1-rc.4" }
auths-id = { path = "crates/auths-id", version = "0.0.1-rc.4" }
auths-verifier = { path = "crates/auths-verifier", version = "0.0.1-rc.4", default-features = false }
auths-policy = { path = "crates/auths-policy", version = "0.0.1-rc.4" }
auths-index = { path = "crates/auths-index", version = "0.0.1-rc.4" }
auths-telemetry = { path = "crates/auths-telemetry", version = "0.0.1-rc.4" }
auths-crypto = { path = "crates/auths-crypto", version = "0.0.1-rc.4", default-features = false }
auths-sdk = { path = "crates/auths-sdk", version = "0.0.1-rc.4" }
auths-infra-git = { path = "crates/auths-infra-git", version = "0.0.1-rc.4" }
auths-infra-http = { path = "crates/auths-infra-http", version = "0.0.1-rc.4" }
auths-oidc-bridge = { path = "crates/auths-oidc-bridge", version = "0.0.1-rc.6" }
auths-storage = { path = "crates/auths-storage", version = "0.0.1-rc.4" }
