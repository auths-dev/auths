[package]
name = "auths-node"
# Tracks the published npm package version so `version()` (which reads
# CARGO_PKG_VERSION) reports the truth. auths-node is its own (nested) Cargo
# workspace, so the source of truth is the [workspace.package] version below —
# the release step bumps it in lockstep with package.json.
version.workspace = true
edition = "2024"
description = "Node.js bindings for the Auths decentralized identity SDK"
license = "Apache-2.0"
publish = false

[workspace]

[workspace.package]
version = "0.1.15"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi4", "async", "tokio_rt", "serde-json"] }
napi-derive = "3"

# Core auths crates (same as auths-python)
auths-sdk = { path = "../../crates/auths-sdk" }
auths-core = { path = "../../crates/auths-core", features = ["keychain-file-fallback"] }
auths-id = { path = "../../crates/auths-id" }
auths-crypto = { path = "../../crates/auths-crypto" }
auths-verifier = { path = "../../crates/auths-verifier" }
auths-keri = { path = "../../crates/auths-keri" }
auths-rp = { path = "../../crates/auths-rp" }
auths-evidence = { path = "../../crates/auths-evidence" }
auths-storage = { path = "../../crates/auths-storage", features = ["backend-git"] }
auths-policy = { path = "../../crates/auths-policy" }
auths-pairing-daemon = { path = "../../crates/auths-pairing-daemon" }
auths-infra-git = { path = "../../crates/auths-infra-git" }

# In-process registry fetch for git-less hosts (serverless functions): the
# workspace's git2 is deliberately transportless; the binding opts into HTTPS
# (vendored TLS where the target needs it) so fetchRegistry works everywhere.
git2 = { version = "0.21.0", default-features = false, features = ["vendored-libgit2", "https", "vendored-openssl"] }

# Utilities
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
rand = "0.8"
tokio = { version = "1", features = ["sync", "net", "rt"] }
reqwest = { version = "0.13.2", default-features = false, features = ["rustls", "json"] }
hex = "0.4"
chrono = "0.4"
ring = "0.17"
json-canon = "=0.1.3"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
shellexpand = "3"
url = "2"
axum = "0.8"

[build-dependencies]
napi-build = "2"
