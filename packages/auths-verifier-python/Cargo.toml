[package]
name = "auths-verifier-python"
version = "0.1.0"
edition = "2021"
description = "Python bindings for Auths attestation verification"
license = "MIT"

# Exclude from main workspace - built separately with maturin
[workspace]

[lib]
name = "_native"
crate-type = ["cdylib"]

[dependencies]
# PyO3 for Python bindings
pyo3 = { version = "0.21", features = ["extension-module", "abi3-py38"] }

# Auths verifier
auths-verifier = { path = "../../crates/auths-verifier" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4.3"

# Crypto
ring = "0.17"

# Async runtime for calling async verifier functions
tokio = { version = "1", features = ["rt"] }

# Canonicalization (RFC 8785 JCS)
json-canon = "0.1.3"

# Date/time
chrono = "0.4"
