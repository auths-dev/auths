[package]
name = "auths-agent-python"
version = "0.0.1-rc.7"
edition = "2024"
description = "Python bindings for Auths agent identity and MCP token exchange"
license = "Apache-2.0"
publish = false

[lib]
name = "_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.21", features = ["extension-module", "abi3-py38"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }

[workspace]
