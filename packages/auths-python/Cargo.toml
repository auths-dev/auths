[package]
name = "auths-python"
version = "0.1.0"
edition = "2024"
description = "Python bindings for the Auths decentralized identity SDK"
license = "Apache-2.0"
publish = false

[workspace]

[lib]
name = "_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.21", features = ["extension-module", "abi3-py38"] }
auths-verifier = { path = "../../crates/auths-verifier" }
ring = "0.17"
json-canon = "0.1.3"
chrono = "0.4"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
