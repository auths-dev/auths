[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "auths-python"
version = "0.1.0"
description = "Auths Python SDK - decentralized identity for developers and AI agents"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX :: Linux",
    "License :: OSI Approved :: Apache Software License",
    "Typing :: Typed",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Version Control :: Git",
]
keywords = ["identity", "cryptography", "did", "signing", "verification", "git", "keri"]

[project.urls]
Homepage = "https://auths.dev"
Repository = "https://github.com/auths-dev/auths"
Documentation = "https://docs.auths.dev"
"Bug Tracker" = "https://github.com/auths-dev/auths/issues"

[project.optional-dependencies]
jwt = ["PyJWT>=2.0", "cryptography>=3.0"]

[dependency-groups]
dev = ["pytest>=7"]

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "auths._native"
strip = true

[tool.pytest.ini_options]
testpaths = ["tests"]
