# cargo-audit configuration
# See: https://docs.rs/cargo-audit/latest/cargo_audit/config/

[advisories]
ignore = [
    # RSA timing side-channel in rsa v0.9.10 (via ssh-key -> ssh-agent-lib).
    # No upstream fix available. Auths uses Ed25519 exclusively for its own
    # keys; RSA code path is only reachable through SSH key import/export.
    "RUSTSEC-2023-0071",

    # rustls-pemfile issue (via axum-server -> auths-core witness server).
    # Only affects the optional witness-server feature, not core signing or
    # verification paths.
    "RUSTSEC-2025-0134",

    # rustls-webpki 0.101.7 CRL matching logic error (via aws-smithy-http-client
    # -> hyper-rustls 0.24 -> rustls 0.21). Pinned by AWS SDK's legacy TLS stack.
    # No update available until AWS SDK drops rustls 0.21 support.
    "RUSTSEC-2026-0049",

    # lru IterMut stacked-borrows violation (via aws-sdk-s3 -> lru 0.12.5).
    # Patched in lru >= 0.16.3, but blocked until aws-sdk-s3 updates its dep.
    "RUSTSEC-2026-0002",
]

[yanked]
# uds_windows 1.2.0 is yanked but is a transitive dep of zbus; no direct fix available.
enabled = false
