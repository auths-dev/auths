# cargo-audit configuration
# See: https://docs.rs/cargo-audit/latest/cargo_audit/config/

[advisories]
ignore = [
    # RSA timing side-channel in rsa v0.9.10 (via ssh-key -> ssh-agent-lib).
    # No upstream fix available. Auths uses Ed25519 exclusively for its own
    # keys; RSA code path is only reachable through SSH key import/export.
    "RUSTSEC-2023-0071",

    # rustls-pemfile issue (via axum-server -> auths-core witness server).
    # Only affects the optional witness-server feature, not core signing or
    # verification paths.
    "RUSTSEC-2025-0134",

    # rustls-webpki 0.101.7 CRL matching logic error (via aws-smithy-http-client
    # -> hyper-rustls 0.24 -> rustls 0.21). Pinned by AWS SDK's legacy TLS stack.
    # No update available until AWS SDK drops rustls 0.21 support.
    "RUSTSEC-2026-0049",

    # lru IterMut stacked-borrows violation (via aws-sdk-s3 -> lru 0.12.5).
    # Patched in lru >= 0.16.3, but blocked until aws-sdk-s3 updates its dep.
    "RUSTSEC-2026-0002",

    # rustls-webpki URI name constraint issues (via aws-smithy-http-client ->
    # hyper-rustls 0.24 -> rustls 0.21 -> rustls-webpki 0.101.7).
    # Not exploitable: auths doesn't validate X.509 certs; identity is KERI/DID-based.
    # Waiting for AWS SDK to ship with rustls 0.23+.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",

    # rustls-webpki 0.101.7 reachable panic parsing a CRL with an empty
    # onlySomeReasons BIT STRING — same aws-smithy-http-client -> rustls 0.21 ->
    # rustls-webpki 0.101.7 legacy AWS SDK path. Not exploitable: auths doesn't
    # use CRLs and the AWS SDK's TLS path doesn't parse them. The 0.103.x copy is
    # already patched to 0.103.13; this 0.101.7 copy is pinned until the AWS SDK
    # ships rustls 0.23+.
    "RUSTSEC-2026-0104",

    # paste 1.0.15 unmaintained (via rmcp -> the MCP server stack). Proc-macro-only,
    # no runtime surface; no maintained drop-in replacement. Already ignored in deny.toml.
    "RUSTSEC-2024-0436",

    # proc-macro-error2 2.0.1 unmaintained (transitive build-time proc-macro dep). No
    # runtime code path; no fix available upstream.
    "RUSTSEC-2026-0173",

    # rmcp 0.9.1 DNS-rebinding in the Streamable HTTP server transport (via
    # auths-mcp-gateway). Fix is a breaking upgrade to rmcp >= 1.4.0 — tracked and
    # deferred in issue #362. Temporary ignore so unrelated PRs aren't blocked.
    "RUSTSEC-2026-0189",
]

[yanked]
# uds_windows 1.2.0 is yanked but is a transitive dep of zbus; no direct fix available.
enabled = false
