[project]
name = "auths-e2e-tests"
version = "0.1.0"
description = "End-to-end tests for Auths CLI"
requires-python = ">=3.10"

[tool.uv]
package = false

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-xdist>=3.5",
    "PyJWT[crypto]>=2.8",
    "jsonschema>=4.21",
    "filelock>=3.13",
]

[tool.pytest.ini_options]
testpaths = ["."]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "requires_binary: marks tests that require compiled binaries",
    "platform_specific: marks tests that only run on specific platforms",
]
strict_markers = true
timeout = 60
