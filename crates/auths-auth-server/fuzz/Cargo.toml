[package]
name = "auths-auth-server-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
auths-verifier = { path = "../../../../crates/auths-verifier" }
tokio = { version = "1", features = ["rt"] }

[dependencies.auths_auth_server]
package = "auths-auth-server"
path = ".."

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "concurrent_verify"
path = "fuzz_targets/concurrent_verify.rs"
test = false
doc = false

[profile.release]
debug = 1
