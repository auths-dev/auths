<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Bank - Login with Auths</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #16213e;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .btn {
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .btn:hover { background: #1a4a7a; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    #qr-container {
      margin: 24px auto;
      padding: 16px;
      background: white;
      border-radius: 12px;
      border: 2px solid #e8e8e8;
      display: inline-block;
    }
    #qr-container canvas { display: block; }
    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #888;
    }
    .status.polling::after {
      content: '';
      animation: dots 1.5s steps(3, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }
    .success {
      margin-top: 24px;
      padding: 20px;
      background: #e8f5e9;
      border-radius: 12px;
      color: #2e7d32;
    }
    .success .check { font-size: 48px; margin-bottom: 12px; }
    .success .did {
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      margin-top: 8px;
      color: #555;
    }
    .expired {
      margin-top: 24px;
      padding: 20px;
      background: #fff3e0;
      border-radius: 12px;
      color: #e65100;
    }
    .hidden { display: none; }
    .instructions {
      margin-top: 16px;
      font-size: 13px;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Acme Bank</div>
    <div class="subtitle">Secure, un-phishable login powered by Auths</div>

    <div id="login-section">
      <button class="btn" id="login-btn" onclick="startLogin()">Login with Auths</button>
    </div>

    <div id="qr-section" class="hidden">
      <div id="qr-container"></div>
      <div class="instructions">
        Scan this QR code with your Auths app<br>
        and approve with FaceID
      </div>
      <div class="status polling" id="status-text">Waiting for approval</div>
    </div>

    <div id="success-section" class="hidden">
      <div class="success">
        <div class="check">&#10003;</div>
        <strong>Authenticated!</strong>
        <div class="did" id="verified-did"></div>
      </div>
    </div>

    <div id="expired-section" class="hidden">
      <div class="expired">
        Session expired. Please try again.
      </div>
      <button class="btn" style="margin-top:16px" onclick="startLogin()">Try Again</button>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let pollTimer = null;

    function show(id) {
      ['login-section', 'qr-section', 'success-section', 'expired-section']
        .forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    async function startLogin() {
      show('qr-section');
      document.getElementById('qr-container').innerHTML = '';
      document.getElementById('status-text').textContent = 'Waiting for approval';

      try {
        const resp = await fetch(API_BASE + '/auth/init', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ domain: window.location.hostname })
        });

        if (!resp.ok) throw new Error('Init failed: ' + resp.status);

        const data = await resp.json();
        const authServerB64 = btoa(API_BASE);
        const qrPayload = `auths://auth?id=${data.id}&c=${data.challenge}&d=${data.domain}&e=${authServerB64}`;

        QRCode.toCanvas(document.createElement('canvas'), qrPayload, {
          width: 240,
          margin: 2,
          color: { dark: '#16213e', light: '#ffffff' }
        }, function(err, canvas) {
          if (err) { console.error(err); return; }
          document.getElementById('qr-container').appendChild(canvas);
        });

        startPolling(data.id);
      } catch (err) {
        console.error('Login init error:', err);
        document.getElementById('status-text').textContent = 'Error: ' + err.message;
      }
    }

    function startPolling(sessionId) {
      if (pollTimer) clearInterval(pollTimer);

      pollTimer = setInterval(async () => {
        try {
          const resp = await fetch(API_BASE + '/auth/status/' + sessionId);
          if (!resp.ok) throw new Error('Status check failed');

          const data = await resp.json();

          if (data.status === 'verified') {
            clearInterval(pollTimer);
            pollTimer = null;
            document.getElementById('verified-did').textContent = data.did;
            show('success-section');
          } else if (data.status === 'expired') {
            clearInterval(pollTimer);
            pollTimer = null;
            show('expired-section');
          }
        } catch (err) {
          console.error('Polling error:', err);
        }
      }, 2000);
    }
  </script>
</body>
</html>
