[package]
name = "auths-storage"
version.workspace = true
edition = "2024"
publish = true
license.workspace = true
description = "Storage backends for Auths identity system — Git and SQL adapters"
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["storage", "git", "sqlite", "identity", "adapter"]
categories = ["database"]

[dependencies]
auths-id = { workspace = true }
auths-core = { workspace = true }
auths-verifier = { workspace = true, features = ["native"] }
thiserror.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
anyhow = "1"
base64.workspace = true
ring.workspace = true

# Backend-specific optional dependencies
git2 = { version = "0.20", optional = true }
fs2 = { version = "0.4", optional = true }
tempfile = { version = "3", optional = true }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres"], optional = true, default-features = false }
tokio = { workspace = true, optional = true }
async-trait = { version = "0.1", optional = true }
auths-index = { workspace = true, optional = true }

[features]
backend-git = ["dep:git2", "dep:fs2", "dep:tempfile", "dep:tokio", "dep:async-trait"]
backend-postgres = ["dep:sqlx", "dep:tokio", "dep:async-trait"]
indexed-storage = ["dep:auths-index"]

[dev-dependencies]
auths-id = { workspace = true, features = ["test-utils"] }
auths-core = { workspace = true, features = ["test-utils"] }
criterion = { version = "0.8.2", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "registry"
harness = false
required-features = ["backend-git"]
