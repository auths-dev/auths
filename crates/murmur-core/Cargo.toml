[package]
name = "murmur-core"
version.workspace = true
edition = "2024"
rust-version = "1.93"
authors = ["Auths Contributors"]
description = "Murmur core: the phone-number-free messenger's identity/transport/ratchet glue — an AID-addressed, KERI-rooted envelope over untrusted store-and-forward relays."
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["identity", "messaging", "keri", "signal", "relay"]
categories = ["authentication", "cryptography"]

[lib]
name = "murmur_core"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = { workspace = true }
# Identity signing + verification: the AID's signing key authenticates the
# sender. Routed through the workspace crypto crate's synchronous Ed25519
# primitives (no async runtime in the engine), the same backend the rest of
# auths signs with.
auths-crypto = { path = "../auths-crypto" }
# Real, audited AEAD + KDF for the relay-opaque envelope. chacha20poly1305 is
# the same construction ring uses; HKDF-SHA256 derives the per-message content
# key. Pure-Rust, already in the workspace lock — no new transitive tree.
chacha20poly1305 = "0.10"
hkdf = "0.12"
sha2 = "0.10"
# HMAC-SHA256 is the chain KDF of the forward-secret symmetric ratchet (the same
# construction Signal's Double-Ratchet chain step uses): message_key =
# HMAC(chain_key, 0x01), chain_key' = HMAC(chain_key, 0x02). Already in the
# workspace lock; pinned through the workspace.
hmac = { workspace = true }
# Zeroize spent message keys and the prior chain key on every ratchet advance, so
# a session state captured between messages holds no key from which an earlier
# message could be recovered. Already a workspace dependency.
zeroize = { workspace = true }
# X25519 Diffie-Hellman for the X3DH key agreement that roots a session in a
# KERI-authenticated prekey bundle. The recipient's Signal identity key and
# signed prekey are X25519 DH keys — DISTINCT from the AID's Ed25519 signing key
# (no signing↔DH key reuse). Already in the workspace lock (auths-core uses it).
x25519-dalek = { version = "2", features = ["static_secrets"] }
# A fresh per-message AEAD nonce. Pure OS entropy, no PRNG state to carry.
getrandom = "0.2"
# The audited Olm/Megolm Double Ratchet (Matrix), Apache-2.0, Least-Authority-
# audited, pure Rust. Optional: behind the `olm` feature it provides an alternate
# message-encryption backend (an audited library ratchet) that the engine can use
# in place of the in-tree ratchet, joined to the same KERI-rooted prekey bundle.
# version_2 sessions (full, untruncated MAC) need `experimental-session-config`.
# Pinned EXACTLY: v2 (full MAC) and its API live behind an upstream-experimental
# feature, and vodozemac 0.10 made the truncated-MAC v1 the Default — a loose
# `^0.10` bump could silently drop the full MAC. `session_config_is_v2_full_mac`
# asserts the version stays 2, so a regression fails the build, not production.
vodozemac = { version = "=0.10.0", optional = true, features = ["experimental-session-config"] }

[features]
default = []
# Use the audited Olm library ratchet as the message-encryption backend, joined to
# the KERI identity root. Off by default; the in-tree ratchet remains the default
# until parity is proven and the join is externally audited.
olm = ["dep:vodozemac"]
# The hermetic proof harness (`proofs` module): the deliver_*/prove_*/hold_* legs the
# relay binary's self-test drives. Off by default so the engine's public surface is the
# engine; `murmur-relay` enables it. (Always available under `cfg(test)`.)
proofs = []

[lints]
workspace = true
