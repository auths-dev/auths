[package]
name = "auths-scim"
version.workspace = true
edition = "2024"
description = "SCIM 2.0 resource types and protocol logic for Auths agent provisioning"
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["scim", "provisioning", "identity", "enterprise"]
categories = ["authentication"]

[dependencies]
# Typed identity newtype (validate-on-deserialize, fail-closed). NOT auths-sdk —
# auths-scim stays decoupled from the SDK; this is the Layer-1 verifier only.
auths-verifier.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = { workspace = true }
nom = "8"

[dev-dependencies]

[lints]
workspace = true
