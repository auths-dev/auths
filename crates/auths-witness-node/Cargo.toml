[package]
name = "auths-witness-node"
description = "Operator orchestration for running a hardened witness node: embedded standup manifest, key custody policy, and the node's health surface — composes the platform witness/KERI/verifier crates, reimplements no protocol"
version.workspace = true
edition = "2024"
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["auths", "keri", "witness", "operator", "standup"]
categories = ["cryptography", "network-programming"]

[lib]
name = "auths_witness_node"
path = "src/lib.rs"

[[bin]]
name = "witness-node"
path = "src/bin/witness_node.rs"

[dependencies]
# Composition over the platform's PUBLIC crate APIs — depending on these IS the
# integration. The node crate orchestrates operator standup around the hardened
# witness server; it reimplements no receipt / key-state / CESR / SAID logic.
auths-anchor.workspace = true
auths-crypto.workspace = true
auths-keri.workspace = true
auths-verifier = { workspace = true, features = ["native"] }
# The witness's own append-only log (tile store + signed checkpoints) — the
# logged half of every finalization-grade cosignature.
auths-transparency = { workspace = true, features = ["native"] }
# Party key resolution from a local registry copy (delegator check + current
# keys), through the SDK's public storage surface.
auths-sdk = { workspace = true, features = ["backend-git"] }

anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = { version = "2", default-features = false }
parking_lot.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror.workspace = true
# OS CSPRNG for minting the node's stable signing-identity seed at first boot.
# Only the OS-backed `OsRng` is used (the workspace bans `thread_rng`/`random`).
rand = { workspace = true }
hex = "0.4"
# The serve surface: hardened HTTP ingest for the anchor role (body cap,
# concurrency limit, timeout — the same posture as the KEL witness server).
axum = { version = "0.8" }
clap = { version = "4", features = ["derive", "env"] }
tower = { version = "0.5", features = ["limit"] }
tower-http = { version = "0.6", features = ["timeout"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "signal", "sync"] }
# Durable per-seed anchor state — the workspace's single `links = sqlite3` owner.
sqlite = { version = "0.32", features = ["bundled"] }
# The cosign role's signed-note signing primitive (as in auths-transparency).
ring = { workspace = true }
# The KEL role's shared router + state (composed, never forked). The feature
# is declared here, not inherited: without it a `-p auths-witness-node` build
# only compiles when some other workspace member happens to unify it in.
auths-core = { workspace = true, features = ["witness-server"] }

[dev-dependencies]
tempfile = "3"
# Router-level tests drive the roles' apps in-process.
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
# The build-attestation verdict composes the async platform verifier; its tests
# need a runtime to drive it.
tokio = { workspace = true, features = ["rt", "macros"] }

[lints]
workspace = true
