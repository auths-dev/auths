[package]
name = "auths-pairing-protocol-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.auths_pairing_protocol]
package = "auths-pairing-protocol"
path = ".."

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "fuzz_token"
path = "fuzz_targets/fuzz_token.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_response"
path = "fuzz_targets/fuzz_response.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_envelope"
path = "fuzz_targets/fuzz_envelope.rs"
test = false
doc = false
bench = false
