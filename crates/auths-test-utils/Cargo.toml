[package]
name = "auths-test-utils"
version.workspace = true
edition = "2024"
publish = false
license.workspace = true
description = "Shared test utilities for the auths workspace"

[dependencies]
async-trait = "0.1"
auths-core.workspace = true
auths-crypto.workspace = true
auths-id.workspace = true
auths-storage = { workspace = true, features = ["backend-git"] }
auths-sdk.workspace = true
auths-telemetry.workspace = true
auths-verifier = { workspace = true, features = ["native"] }
base64.workspace = true
chrono = { version = "0.4", features = ["serde"] }
git2 = "0.20.4"
ring.workspace = true
tempfile = "3"
rand = "0.10.0"
anyhow = "1"
mockall = "0.13"
serde_json = "1"
uuid.workspace = true
