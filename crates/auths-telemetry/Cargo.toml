[package]
name = "auths-telemetry"
description = "Telemetry and metrics for Auths components."
version.workspace = true
edition = "2024"
publish = true
license.workspace = true
keywords = ["telemetry", "security", "events", "observability"]
categories = ["development-tools"]
repository.workspace = true
homepage.workspace = true

[lib]
name = "auths_telemetry"
path = "src/lib.rs"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
metrics = "0.24"
metrics-exporter-prometheus = "0.18.1"
reqwest = { version = "0.13.2", features = ["json"], optional = true }
schemars.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { workspace = true, optional = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

[features]
test-utils = []
sink-http = ["dep:reqwest", "dep:tokio"]

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
wiremock = "0.6"

[lints]
workspace = true
