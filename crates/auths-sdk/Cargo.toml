[package]
name = "auths-sdk"
version.workspace = true
edition = "2024"
description = "Application services layer for Auths identity operations"
publish = true
license.workspace = true
repository = "https://github.com/auths-dev/auths"
keywords = ["sdk", "identity", "did", "cryptography", "attestation"]
categories = ["cryptography", "authentication"]

[dependencies]
auths-core.workspace = true
auths-id.workspace = true
auths-policy.workspace = true
auths-crypto.workspace = true
auths-verifier = { workspace = true, features = ["native"] }
ring.workspace = true
thiserror.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
json-canon = "0.1"
base64 = "0.22"
chrono = "0.4"
hex = "0.4"
html-escape = "0.2"
zeroize = "1.8"

[features]
test-utils = ["auths-id/test-utils"]

[dev-dependencies]
auths-core = { workspace = true, features = ["test-utils"] }
auths-id = { workspace = true, features = ["test-utils"] }
auths-verifier = { workspace = true, features = ["test-utils"] }
auths-storage = { workspace = true, features = ["backend-git"] }
git2 = "0.20.4"
sha2 = "0.10"
tempfile = "3"
