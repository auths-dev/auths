[package]
name = "auths-sdk"
version.workspace = true
edition = "2024"
description = "Application services layer for Auths identity operations"
publish = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["sdk", "identity", "did", "cryptography", "attestation"]
categories = ["cryptography", "authentication"]

[dependencies]
auths-keri.workspace = true
async-trait = "0.1"
auths-core = { workspace = true, public = true }
auths-id = { workspace = true, public = true }
auths-storage = { workspace = true, optional = true, public = true }
auths-infra-http.workspace = true
auths-oidc-port = { path = "../auths-oidc-port" }
auths-telemetry.workspace = true
auths-policy.workspace = true
auths-crypto.workspace = true
parking_lot.workspace = true
auths-verifier = { workspace = true, features = ["native"] }
auths-transparency = { workspace = true, features = ["native"] }
ring.workspace = true
thiserror.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
json-canon.workspace = true
base64 = "0.22"
chrono = "0.4"
hex = "0.4"
html-escape = "0.2"
p256 = { version = "0.13", features = ["ecdsa"] }
ssh-key = { version = "0.6", features = ["ecdsa"] }
tempfile = "3"
url = { version = "2", features = ["serde"] }
flate2 = "1"
rand = "0.9"
tar = "0.4"
walkdir = "2"
zeroize = "1.8"
uuid = { workspace = true, features = ["serde", "v4"] }
dashmap = "6"
reqwest = { version = "0.13.2", default-features = false, features = ["rustls", "json"], optional = true }
auths-pairing-daemon = { workspace = true, optional = true }

[features]
test-utils = ["auths-id/test-utils"]
mcp = ["dep:reqwest"]
lan-pairing = ["dep:auths-pairing-daemon"]
backend-git = ["dep:auths-storage", "auths-storage/backend-git"]
witness-server = ["auths-core/witness-server"]
witness-client = ["auths-id/witness-client"]
indexed-storage = ["auths-id/indexed-storage"]
keychain-secure-enclave = ["auths-core/keychain-secure-enclave"]

[dev-dependencies]
auths-sdk = { path = ".", features = ["test-utils"] }
auths-core = { workspace = true, features = ["test-utils"] }
auths-id = { workspace = true, features = ["test-utils"] }
auths-verifier = { workspace = true, features = ["test-utils"] }
auths-storage = { workspace = true, features = ["backend-git"] }
base64 = "0.22"
flate2 = "1"
git2.workspace = true
tar = "0.4"
tempfile = "3"
tokio = { workspace = true }

[lints]
workspace = true
