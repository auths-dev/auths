[package]
name = "auths-verifier"
version.workspace = true
edition = "2024"
description = "Minimal-dependency attestation verification library for Auths - supports FFI and WASM"
publish = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["cryptography", "verification", "attestation", "ed25519", "wasm"]
categories = ["cryptography", "authentication"]

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
auths-crypto.workspace = true
auths-keri.workspace = true
base64.workspace = true
bs58 = "0.5.1"
chrono = { version = "0.4", features = ["serde"] }
hex = { version = "0.4.3", features = ["serde"] }
json-canon.workspace = true
async-trait = "0.1"
log = "0.4"
ring = { workspace = true, optional = true }
# Pure-Rust, executor-free signature verification for the synchronous verifier core
# (`software_verify`). Both crates compile on wasm32 (no ring, no WebCrypto, no async),
# which is what lets `verify_presentation_sync`/`verify_credential_sync` run with no
# executor on every binding target. P-256 matches the workspace default curve and the
# `p256` crate the signing side already uses, so verification is byte-for-byte in parity.
p256 = { version = "0.13", features = ["ecdsa"] }
ed25519-dalek = { version = "2", default-features = false }
schemars = { workspace = true, optional = true, features = ["chrono"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
sha2.workspace = true
subtle.workspace = true
thiserror.workspace = true

# Optional dependencies
libc = { version = "0.2", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
# getrandom v0.4: our direct WASM entropy source
getrandom = { version = "0.4.1", optional = true }
# getrandom v0.2: ring pulls this transitively; on wasm32 it needs the "js" feature
getrandom_02 = { package = "getrandom", version = "0.2", optional = true }
tokio = { workspace = true, optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
# Enable this crate's own `test-utils` (AttestationBuilder, MockClock) for the
# integration tests — they link the lib as a separate crate and so don't get
# `cfg(test)`.
auths-verifier = { path = ".", features = ["test-utils"] }
auths-crypto = { workspace = true, features = ["test-utils"] }
proptest = "1.4"
pkcs8 = { version = "0.10", features = ["alloc"] }
p256 = { version = "0.13", features = ["ecdsa"] }
ring.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = ["native"]
native = ["dep:ring", "auths-crypto/native"]
ffi = ["libc", "native", "dep:tokio"]
wasm = ["wasm-bindgen", "dep:wasm-bindgen-futures", "getrandom/wasm_js", "getrandom_02/js", "auths-crypto/wasm"]
test-utils = ["auths-crypto/test-utils"]
schema = ["dep:schemars", "auths-keri/schema"]

[lints]
workspace = true
