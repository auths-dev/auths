[package]
name = "auths-verifier"
version.workspace = true
edition = "2024"
description = "Minimal-dependency attestation verification library for Auths - supports FFI and WASM"
publish = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
keywords = ["cryptography", "verification", "attestation", "ed25519", "wasm"]
categories = ["cryptography", "authentication"]

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
auths-crypto.workspace = true
base64.workspace = true
blake3 = "1.5"
bs58 = "0.5.1"
chrono = { version = "0.4", features = ["serde"] }
hex = { version = "0.4.3", features = ["serde"] }
json-canon = "0.1"
async-trait = "0.1"
log = "0.4"
ring = { workspace = true, optional = true }
schemars = { workspace = true, optional = true, features = ["chrono"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
thiserror.workspace = true

# Optional dependencies
libc = { version = "0.2", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
# getrandom v0.4: our direct WASM entropy source
getrandom = { version = "0.4.1", optional = true }
# getrandom v0.2: ring pulls this transitively; on wasm32 it needs the "js" feature
getrandom_02 = { package = "getrandom", version = "0.2", optional = true }
tokio = { workspace = true, optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
auths-crypto = { workspace = true, features = ["test-utils"] }
proptest = "1.4"
pkcs8 = { version = "0.10", features = ["alloc"] }
ring.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = ["native"]
native = ["dep:ring", "auths-crypto/native"]
ffi = ["libc", "native", "dep:tokio"]
wasm = ["wasm-bindgen", "dep:wasm-bindgen-futures", "getrandom/wasm_js", "getrandom_02/js", "auths-crypto/wasm"]
test-utils = ["auths-crypto/test-utils"]
schema = ["dep:schemars"]

[lints]
workspace = true
