[package]
name = "auths-witness"
description = "Slim, hardened KERI rct-witness server binary over the shared auths-core witness library"
version.workspace = true
edition = "2024"
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["auths", "keri", "witness", "receipt"]
categories = ["cryptography", "network-programming"]

[dependencies]
# Only the witness-server slice of auths-core. auths-core `default = []`, so this
# pulls NO platform keychain / ssh-agent / pairing surface — just receive-event →
# validate → sign-receipt → store, plus the W.1.1 stable-identity loader.
auths-core = { workspace = true, features = ["witness-server"] }
auths-crypto.workspace = true
anyhow = "1"
# The binary reads its signed build attestation (a JSON document) from the file
# the deployment env names, and hands it to auths-core verbatim to serve.
serde_json = "1"
clap = { version = "4", features = ["derive", "env"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP hardening: an event is tiny, so cap the body hard; shed bursts via a global
# concurrency cap; time out slow-write clients (Slowloris). Matches the
# pairing-daemon limit posture. Per-IP rate limiting terminates at the reverse
# proxy (documented in the deployment kit).
axum = { version = "0.8" }
tower = { version = "0.5", features = ["util", "limit"] }
tower-http = { version = "0.6", features = ["timeout", "trace"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[[bin]]
name = "auths-witness"
path = "src/main.rs"

[lints]
workspace = true
