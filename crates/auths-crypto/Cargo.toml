[package]
name = "auths-crypto"
version.workspace = true
edition = "2024"
publish = true
license.workspace = true
description = "Cryptographic primitives for Auths: KERI key parsing and DID:key encoding"

[features]
default = ["native"]
native = ["dep:ring", "dep:tokio"]
wasm = ["dep:js-sys", "dep:wasm-bindgen", "dep:wasm-bindgen-futures", "dep:web-sys"]

[dependencies]
async-trait = "0.1"
base64.workspace = true
bs58 = "0.5.1"
js-sys = { version = "0.3", optional = true }
ssh-key = { version = "0.6", features = ["ed25519"] }
thiserror.workspace = true
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
zeroize = { version = "1.8", features = ["derive"] }

[dependencies.web-sys]
version = "0.3"
optional = true
features = ["Crypto", "CryptoKey", "SubtleCrypto"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ring = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
auths-test-utils.workspace = true
ring.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"

[lints.clippy]
print_stdout = "deny"
print_stderr = "deny"
