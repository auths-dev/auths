[package]
name = "auths-scim-server"
description = "SCIM 2.0 provisioning server for Auths — directory lifecycle wired to KERI identity"
version.workspace = true
edition = "2024"
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords = ["auths", "scim", "provisioning", "identity"]
categories = ["web-programming"]

[[bin]]
name = "auths-scim-server"
path = "src/main.rs"

[lib]
name = "auths_scim_server"
path = "src/lib.rs"

[dependencies]
# Types-only SCIM crate (User, ListResponse, filter, PATCH, schema, errors).
# KERI/registry is the source of truth; there is NO authoritative database here.
auths-scim = { path = "../auths-scim", version = "0.1.2" }
# SDK identity lifecycle: the Joiner provisions REAL delegated members via
# `add_member` (no fake DIDs, no authoritative DB). This crate is a presentation
# layer above the SDK, like auths-api.
auths-sdk = { workspace = true, features = ["backend-git"] }
auths-verifier.workspace = true
auths-crypto.workspace = true
# Trait types for building the standalone binary's AuthsContext (like auths-api).
auths-core.workspace = true
auths-id.workspace = true
chrono = { version = "0.4", features = ["serde"] }

axum = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
anyhow = "1"
thiserror.workspace = true
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha2.workspace = true
subtle.workspace = true

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[lints]
workspace = true
