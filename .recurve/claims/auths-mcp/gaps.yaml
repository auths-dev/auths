- id: AGENT-MCP-3
  title: One cross-rail quantitative budget is un-exceedable across a session (pre-auth, checkpoint-anchored)
  class: missing-surface
  status: closed
  severity: headline
  reads: gateway
  covers:
  - budget-boundary
  evidence:
  - maps AGT-4 (caps at verify, auths 15bc605c; verifier-held high-water ledger usage_ledger.rs)
    + AGENT-CAP-1 malformed-predicate guard (00de275c)
  - 'the scaffold wired a gateway-held SessionLedger (crates/auths-mcp-core/src/session.rs)
    which D8 SUPERSEDES: the cap must be the verifier-held monotonic SETTLED counter keyed
    to the agent delegation, not a gateway-side per-session tally'
  - 'BUILT: crates/auths-mcp-core/src/budget.rs — the D8 cross-rail engine. TWO-PART counter
    keyed to the AGENT DELEGATION (not per-credential, not per-rail): (1) SETTLED — a verifier-held
    monotonic high-water total in CENTS (SettledCounter), persisted atomically (temp-write +
    rename) under the org registry the verifier replays, summing spend ACROSS both rails;
    reuses AGT-4 usage_ledger.rs''s mechanism (monotonic, rollback-protected → UsageCounterRolledBack)
    in cents rather than a call count. (2) RESERVED — a transient in-memory holds set (ReservedHolds).
    available = cap − settled − Σ(holds). PRE-AUTHORIZATION: PerCallGate::judge reserves the
    call''s reserve_ceiling_cents BEFORE the rail is touched (refusing usage-cap-exceeded if it
    would exceed available, downstream never invoked); PerCallGate::settle then advances the
    monotonic SETTLED counter by the ACTUAL and RELEASES the slack (ceiling − actual). The
    gateway-held SessionLedger tally was REMOVED (session.rs is now just the $→cents parser);
    the live wrap proxy carries a v0 cap guard, the authoritative cross-rail counter is the
    hermetic gate''s settled ledger. Each receipt (receipt.rs) carries rail + reserved_cents +
    the cross-rail cumulative_cents. CHECKPOINT-ANCHORING: PARKED follow-on — SettledCounter::digest
    exposes the value a periodic anchor would carry, but the periodic anchor + on-mismatch
    halt/revoke/alarm is not wired this cycle; the probe tests prevention (cross-rail un-exceedable
    + reserve/settle/release + rollback), which is fully built. FAILURE BOUND: until anchoring
    lands, max uncaught overspend ≤ one checkpoint interval (detection ≠ reversal, §12).'
  observed: 'GREEN at baseline 2026-06-15: one $5 cap held across BOTH rails — the in-budget
    cross-rail calls passed (call[0] stripe reserved=$3.00 settled=$3.00; call[1] x402 reserved=$2.00
    settled=$1.50, the $0.50 slack RELEASED), each receipt naming its rail (rail=stripe / rail=x402)
    and carrying the cross-rail running total (cross_rail_cumulative=$3.00 → $4.50); the call
    that would RESERVE to $5.10 across rails on the SECOND rail was refused usage-cap-exceeded
    (cap_cents=500 would_be_cents=510) BEFORE the rail was touched (downstream NOT invoked),
    even though x402 ALONE reads only $1.50 — the moat a per-rail-siloed budget structurally
    cannot express. Trap RED (cap-not-enforced): a captured stream where the over-budget cross-rail
    call was ALLOWED is refused (no usage-cap-exceeded verdict — the budget regression). Trap
    RED (counter-rolled-back): a captured stream where a crashed-and-restored gateway reloaded
    a STALE snapshot and accepted a lower settled total is refused (no usage-counter-rolled-back
    verdict — the monotonicity/rollback-protection regression D8 forbids). The two-part counter
    + rollback guard are unit-tested in budget.rs (cross_rail_summing_one_cap_two_rails,
    reserve_settle_releases_slack, settled_counter_is_monotonic_rollback_refused).'
  smallest_fix: 'Enforce ONE cap across rails by pre-authorization against a single monotonic
    SETTLED counter keyed to the AGENT DELEGATION (reuse AGT-4''s verifier-held high-water
    ledger usage_ledger.rs; rollback-protected → UsageCounterRolledBack) plus a transient
    set of RESERVED holds — NOT the gateway-held SessionLedger, which D8 supersedes. `available
    = cap − settled − Σ(active holds)`. Before each paid call RESERVE the cost (or a ceiling,
    for metered calls) — refusing UsageCapExceeded BEFORE the rail is touched if it would
    exceed available — let it proceed, then on the response SETTLE the actual into the monotonic
    total and RELEASE the slack (a hold expires if its call never returns). Sum spend ACROSS
    rails into the one settled counter (a per-rail-siloed budget would miss the cross-rail
    cross-over). Checkpoint-anchor the settled total''s digest periodically (NO per-call chain
    write, NO log growth) so it is tamper-evident and offline-verifiable; carry the running
    cross-rail total (and the rail it settled on) in each receipt. FAILURE BOUND: on a counter-integrity
    failure, max UNCAUGHT overspend ≤ one checkpoint interval — detection is not reversal
    (§12); on a detected rollback/mismatch halt+revoke+alarm. Steer AWAY from the gateway-held
    SessionLedger tally.

    '
  probe: probes/agent-mcp-3.sh
  unlocks: AGT-4 caps bind a live agent's CROSS-RAIL spend, not just one credential; max uncaught
    overspend bounded by the checkpoint interval (§12).

- id: AGENT-MCP-7
  title: 'Custody / bypass-resistance: an agent cannot reach the credentialed downstream without
    going through the gateway'
  class: missing-surface
  status: closed
  severity: headline
  reads: gateway
  covers:
  - custody-boundary
  evidence:
  - 'maps PRD §12 (the custody broker): the gateway must custody the downstream tool''s secret
    (API key / OAuth token / wallet key); the agent holds ONLY its delegation — so a bypassing
    agent has no credential for the raw downstream'
  - 'BUILT: crates/auths-mcp-gateway `wrap` is now a CREDENTIAL-CUSTODY broker. A new
    `--custody-credential NAME[=VALUE]` flag holds the downstream tool''s secret in a CustodyVault
    sourced from the GATEWAY''s own config/environment (NAME=VALUE injects VALUE; bare NAME
    adopts the value from the gateway''s own env, never the agent''s request). On the brokered
    path the vault injects the secret into the spawned downstream''s environment (proxy.rs
    CustodyVault::inject); the agent connects with only its auths delegation and never sees or
    carries the secret. The value is never logged, never echoed into receipts/stdout (Debug is
    redacted to NAME-only; the operator log surfaces NAMES only). Unit-tested: NAME=VALUE /
    bare-NAME parsing, empty-NAME rejection, missing-env rejection, and Debug-redaction (the
    secret value never appears in a derived {:?}).'
  observed: 'GREEN at baseline 2026-06-15: custody holds — the DIRECT (no-gateway) call was
    refused (the agent never held the downstream credential, so the credentialed downstream
    refused it), while the SAME call THROUGH the gateway — which custodied the credential and
    injected it into the downstream from the gateway''s own environment — reached the downstream
    and returned its result ("downstream-data"); the boundary is unbypassable by construction
    for credentialed resources (§12). Verified the custodied secret VALUE never appears in the
    gateway''s combined stdout/stderr (only the variable NAME and the downstream''s own result).
    Trap RED: a captured stream where the direct (no-gateway) bypass REACHED the credentialed
    downstream (custody did not hold, the gateway is bypassable) is refused — the adversarial
    twin holds. Honest limit (§12): custody makes a resource unbypassable only if it is reachable
    SOLELY through the custodied credential; a truly public endpoint is detection-only.'
  smallest_fix: 'Make the gateway a CREDENTIAL-CUSTODY broker: it holds the downstream tool''s
    secret (e.g. injected into the wrapped downstream''s environment / request), the agent
    holds only its scoped/budgeted/revocable delegation. A direct (bypass) call from the agent
    to the raw credentialed downstream fails (no credential); the same call through the gateway,
    which supplies the custodied credential, succeeds. Add a custody surface to `wrap` (hold
    a downstream credential the agent never sees) and prove the split hermetically: a downstream
    stub that requires a credential present only in the gateway''s environment — direct attempt
    refused, via-gateway allowed. Honest limit (§12): custody makes a resource unbypassable
    only if it is reachable SOLELY through the custodied credential; a truly public endpoint
    is detection-only.

    '
  probe: probes/agent-mcp-7.sh
  unlocks: 'Prevention is unbypassable by construction (§12) — the ''API key in an env var''
    majority flips into the strongest pitch: the gateway takes the ambient key out of the
    agent''s hands.'

