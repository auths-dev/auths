  reads: gateway
  covers:
  - revocation-boundary
  evidence:
  - maps OPS-1; keri_auth.rs already checks revocation on presentation — bind it per call
  observed: 'GREEN at baseline 2026-06-15: the pre-revocation call passed and the very next call
    after revocation was refused revoked — liveness re-derived from the chain per call, no
    TTL/introspection lag. The engine enforces it natively via
    auths-verifier::verify_commit_against_kel_scoped; the MCP-1 re-arm fixed verdict_for, which
    revealed per-call liveness was already GREEN end-to-end. Trap RED: a stream where the
    post-revocation call is still allowed (a reopened propagation window) is refused — the
    adversarial twin holds.'
  smallest_fix: 'Re-derive liveness from the KERI registry on every tools/call (reuse keri_auth''s
    revocation check) so the first call after a revocation event is refused Revoked — no cached
    token TTL, no introspection lag.

    '
  probe: probes/agent-mcp-4.sh
  unlocks: OPS-1 instant kill applies to a running agent loop.

