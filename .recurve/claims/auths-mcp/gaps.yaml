    leg is believability evidence attached out-of-band, never the gate.'
  smallest_fix: 'Build the live-mode tool loop (real model) + a transcript recorder/replayer;
    the probe drives the gateway from the committed transcript (no model/network) to byte-stable
    verdicts, and a transcript edited to drop the proof or forge a wider scope still fails
