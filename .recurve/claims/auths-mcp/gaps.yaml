    fixture (probes/fixtures/stripe-charge.test.json) authored TIGHTLY against Stripe''s documented
    Charge object shape (docs.stripe.com/api/charges/object: amount_captured, currency, captured,
    status, livemode:false, balance_transaction) — no live Stripe call'
  - 'BUILT: crates/auths-mcp-core/src/rail.rs — the rail-response cost EXTRACTOR. Given a
    recorded/live Stripe Charge response it reads charge.amount_captured (cents, USD-only —
    a non-USD or live-mode charge is refused, not mis-metered) as the authoritative cost and
