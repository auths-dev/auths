- id: AGENT-MCP-6
  title: 'Cross-org: org A''s agent is bounded by its A->B scoped introduction at org B''s
    gateway'
  class: missing-surface
  status: open
  severity: feature
  reads: gateway
  covers:
  - cross-org-boundary
  evidence:
  - maps AGT-3 (live mutual-introduction leg, not yet built — likely PARK)
  observed: 'RED at baseline 2026-06-15: ours=no-cross-org-verdict expected=allowed+outside-agent-scope
    — B''s gateway produced no introduction-bounded verdict; AGENT-MCP-6 rides AGT-3''s live
    leg (likely PARK until the mutual-introduction runtime lands)'
  smallest_fix: 'Honor a scoped A->B introduction at B''s gateway so a call within the grant
    passes and one exceeding it is refused at B (A cannot widen its own introduction; B never
    trusts A''s self-asserted scope). PARK — do not stub — if the AGT-3 live introduction
    runtime is absent.

    '
  probe: probes/agent-mcp-6.sh
  unlocks: Stranger orgs bound each other's agents — the network leg (AGT-3).
