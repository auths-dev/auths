    core meters a this-call-costs-X signal): crates/auths-mcp-core + the replay path meter
    a pre-supplied cost_cents from the transcript, but there is NO extraction of the charge
    amount from a recorded Stripe charge RESPONSE (no parse of amount_captured / currency
