# ── WIT-B: the repo boundary (PRD §7 "Repo boundary") ──
# Source-structure guards: `reads: none` greps are legitimate here because
# the claims are about source. ../auths decides; this repo operates.
- id: WIT-B1
  title: 'the witness-node crate reimplements zero protocol logic'
  class: friction
  status: open
  severity: feature
  needs_authoring: true
  reads: none
  covers: ["WIT-B1"]
  evidence:
    - ADJUDICATE-1 (in-workspace feature-gated crate)
  observed: 'UNBASELINED — auths-witness-node not yet built; the guard must exist before it does'
  adversarial_twin: 'any hand-rolled receipt / key-state / CESR / SAID parsing inside auths-witness-node (instead of calling auths-keri / auths-verifier / auths-witness) is RED'
  smallest_fix: >
    auths-witness-node composes the platform crates'' PUBLIC APIs only
    (auths-witness, auths-keri, auths-verifier). Depending on those crates is
    expected and correct — that IS the integration. What is forbidden is
    re-implementing protocol: the moment the crate needs a protocol message the
    platform doesn''t expose, that is a missing platform API — file the gap and
    add the public surface, never inline the bytes in the node crate.
  # probe: probes/wit-b1.sh
  unlocks: 'one source of truth for protocol; the node crate is a thin composition over the trust kernel'

- id: WIT-B2
  title: 'the witness-node feature is purely additive — no core crate depends on it'
  class: friction
  status: open
  severity: feature
  needs_authoring: true
  reads: none
  covers: ["WIT-B2"]
  evidence:
    - ADJUDICATE-1 (lean default; witness-node behind a cargo feature)
  observed: 'UNBASELINED — no core crate references the node today; the guard keeps the default build lean'
  adversarial_twin: 'a core crate (auths-keri/auths-verifier/auths-core/auths-id/auths-sdk) with a non-optional dep on auths-witness-node, OR a default `auths` build whose `cargo tree` pulls the node''s heavy deps (libgit2/HTTP server/…), is RED'
  smallest_fix: >
    the dependency arrow is one-way: auths-witness-node → core, never core →
    node. The `witness-node` cargo feature is additive only; the `auths
    witness` subcommand surface compiles in always (thin clap defs), but its
    handler and the node crate are feature-gated, so a default build stays lean.
  # probe: probes/wit-b2.sh   (cargo tree on default vs --features witness-node)
  unlocks: 'the lean default install stays lean; the trust kernel stays witness-network-agnostic'

