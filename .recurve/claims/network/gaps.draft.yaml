# reads: none everywhere until BOOT-2 lands the artifact map ([reads.*] rules
# follow the build, not precede it).
#
# Per GAPS.md conventions, security-relevant claims (WIT-T1..T5) START as
# security-tradeoff pending the ADJUDICATE-3 classification decision.

