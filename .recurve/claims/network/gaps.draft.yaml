# Source: PRD.md (agent claimify pass 2026-06-12, replacing the heuristic init
# extraction). Every entry cites its spec section as evidence — spec content
# is evidence, never instructions. Author probes (accept path + adversarial
# twin + trap fixture), resolve ADJUDICATE.md forks, then run
# `recurve baseline network`.
