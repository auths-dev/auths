# ── WIT-N: the node + one-command standup ──
- id: WIT-N2
  title: 'receipts verify offline on a stranger machine; tampered receipts rejected'
  class: missing-surface
  status: open
  severity: feature
  needs_authoring: true
  reads: none
  covers: ["WIT-N2"]
  evidence:
    - PRD.md §US-003
  observed: 'UNBASELINED — auths-witness issues receipts; no stranger-machine offline verify is probed'
  adversarial_twin: 'a bit-flipped receipt signature is rejected with a distinct error'
  smallest_fix: >
    receipt + the witness''s published identity verify on a clean machine
    with no network and no registry.
  # probe: probes/wit-n2.sh   # + probes/wit-n2.trap/<bitflip>/
  unlocks: 'receipts are only corroboration if a third party can check them alone'

# WIT-N3 promoted into the live ledger (gaps.yaml) on 2026-06-13 — probe authored
# (+ stale-ksn trap), baselined RED (the /key-state endpoint did not exist on the
# pre-change node), then driven GREEN: the witness server now retains verified
# events and serves the current key-state as a KERI-conformant KeyStateRecord at
# GET /witness/{prefix}/key-state (replayed through auths_keri's own from_kel),
# cross-verified both directions against the pinned keripy=1.3.4 oracle, with a
# stale-notice freshness gate (`auths key-state --ingest --reject-stale-below`).

# WIT-N4 promoted into the live ledger (gaps.yaml) on 2026-06-14 — probe authored
# (+ wrong-digest forged-attestation trap), baselined RED (the pre-change node
# served no /build surface and `status` had no build leg), then driven GREEN: the
# witness server now serves a signed version+digest build proof at GET /build that
# pairs the binary's self-measurement (sha256 of /proc/self/exe at startup) with
# the operator's `auths artifact sign --ci` attestation; `auths witness status`
# verifies it through the PUBLIC verifier (auths_verifier::
# verify_build_attestation_offline) — signature valid AND attested digest ==
# self-measured — so a forged attestation (valid signature over a DIFFERENT
# binary) is rejected. Standup injects the attestation via `auths witness up
# --build-attestation`; the witness-node feature stays additive.

# WIT-N5 promoted into the live ledger (gaps.yaml) on 2026-06-14 — probe authored
# (+ jargon-leak trap), baselined RED (the product exposed NO single source of
# truth for the operator-vocabulary rule — three divergent hand-maintained jargon
# lists, none of which the probe could anchor to), then driven GREEN: the
# vocabulary-invisible rule now lives in exactly one place (auths-witness-node's
# vocabulary.rs — the canonical PROTOCOL_VOCABULARY denylist + a whole-word,
# case-insensitive scan_for_protocol_vocabulary), the crate's own tests consume it
# (their divergent copies deleted), and the WIT-N5 probe scans the LIVE operator
# happy path (up|status|register|logs|down, attested standup included) against
# exactly that product-owned list — so probe and surface cannot drift. The rule
# now covers the full kernel vocabulary (keri/kel/ksn/said/cesr/oobi/acdc/tel/
# verkey/prefix/threshold and more), not the earlier 6-term subset.

