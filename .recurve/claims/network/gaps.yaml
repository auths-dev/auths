# gaps.yaml — the LIVE ledger for the witness-network conformance suite.
#
# Promoted from gaps.draft.yaml as cycles author probes and baseline claims.
# Reuses the recurve gap schema (parsed by recurvelib/model.py). Status:
#   open    → probe expected RED  (a behavior the suite drives into existence)
#   closed  → probe expected GREEN (a behavior now present, guarded against regression)
#
# Each open entry carries its REAL observed RED line (what the probe actually
# printed, dated), never a guess — a gap without a measured red is an opinion.

# ── scaffolding: greenfield bootstrap order ──
