  smallest_fix: >
    lift the operator-vocabulary rule into one place: a canonical
    PROTOCOL_VOCABULARY denylist + a whole-word case-insensitive
    scan_for_protocol_vocabulary in auths-witness-node, consumed by the crate's
    own happy-path tests (their divergent jargon copies deleted). The probe scans
