  observed: >
    GREEN 2026-06-14: `NO_COLOR=1 bash probes/wit-n5.sh` → "the operator happy
    path carries zero protocol vocabulary: every line `witness up|status|register|
    logs|down` printed (attested standup included) passed a whole-word,
