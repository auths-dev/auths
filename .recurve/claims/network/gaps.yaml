    (reads:cli for the standup, reads:source for the denylist — both legitimate
    because the claim is about output strings), so probe and surface cannot drift
    and the green forbids precisely the words the product forbids.
  probe: probes/wit-n5.sh
  unlocks: 'the vocabulary-invisible rule, carried to operators — one owner, full coverage, a guard that cannot drift from the surface it protects'
