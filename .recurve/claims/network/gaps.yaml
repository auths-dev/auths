- id: WIT-N1
  title: 'one command, one witness — `up` reaches a healthy node or fails honestly'
  class: missing-surface
  status: closed
  severity: headline
  reads: cli
  covers: ["WIT-N1"]
  evidence:
    - PRD.md §US-001, §FR-1, §FR-2, §FR-4
  observed: >
    GREEN 2026-06-13: `bash probes/wit-n1.sh` → "one command stood up a healthy
    witness: `witness up` exited 0, printed http://127.0.0.1:3340/health, the node
    answers there, and the happy path carries zero protocol vocabulary" (exit 0);
    the occupied-port trap is RED (exit 1). What unblocked it was the shared
    prerequisite BOOT-1 flagged — an OBTAINABLE node image — plus two real fixes
    in ../auths: (1) the canonical witness deployment Dockerfile was genuinely
    broken (it added the musl target to a different toolchain than the
    rust-toolchain.toml selects, and hardcoded x86_64 on an arm64 host → E0463
    "can't find crate for core") and now resolves the static target from
    TARGETARCH after the source copy, so the released image builds natively on
    both arches; (2) the embedded standup manifest dropped a transparency-log
    `monitor` sidecar that referenced an unshippable image and blocked the whole
    `compose up`, and `up` now mints the node's stable signing identity at first
    boot (OS-CSPRNG seed injected via a `.env`, never a key file baked in), so the
    released-image node actually becomes healthy. The harness owns image
    acquisition (harness/ensure-image.sh builds-once from the canonical
    Dockerfile, tags auths-witness:net-fixture); `up` runs that RELEASED image
    (`--image`), never a source build (WIT-B4 holds). Earlier baseline (RED, same
    day): "ours=exit1 expected=exit0 — `witness up` did not complete a standup …"
    when no node image was obtainable; `up` failed honestly then, which is the
    adversarial half of the same claim.
  adversarial_twin: >
    occupied port / absent Docker fails with a one-line actionable error and
    leaves NO partial state; file-key fallback refuses without --accept-file-key.
  smallest_fix: >
    `up` wraps embedded Compose (the released witness node), mints the node
    identity at first boot, prints a health URL, exits 0 — and on a clean box
    reaches healthy ≤ 600s. The probe drives `up` against a throwaway port/data
    dir (with the harness having made the released image present) and asserts a
    real node answers the printed URL with zero protocol vocabulary; on a box with
    no engine it asserts the clean adversarial refusal instead. Trap: an `up` that
    exits 0 on an occupied port (partial-state lie) stays RED.
  probe: probes/wit-n1.sh
  unlocks: 'G1 — the flywheel cost-per-turn; the first thing every partner runs'

