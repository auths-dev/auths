- id: WIT-N3
  title: 'node serves conformant key-state notices (cross-verified vs the oracle)'
  class: wire-mismatch
  status: closed
  severity: feature
  reads: cli
  covers: ["WIT-N3"]
  evidence:
    - PRD.md §US-003, §FR-3 (node serves KERI-conformant KSN at a stable endpoint; cross-verified against the keripy oracle)
    - depends on interop IOP-L3c (KSN wire shape — owned there, referenced not duplicated; the same keripy=1.3.4 pin in harness/versions.lock)
    - 'Repo boundary (PRD §7): the KSN wire shape + replay are protocol (must be correct for strangers) → they live in auths-keri/auths-core; the node only serves and the operator CLI only ingests (WIT-B1)'
  observed: >
    GREEN 2026-06-13: `NO_COLOR=1 bash probes/wit-n3.sh` → "the node serves a
    conformant key-state notice: a live node witnessed a real inception and served
    a KERI ksn wire record that the keripy oracle (1.3.4) reconstructs
    byte-for-byte (node→oracle), the node ingests a notice the oracle publishes
    (oracle→node), and a stale notice is detected as stale — IOP-L3c's wire
    conformance now holds against the running node" (exit 0); the stale-ksn trap
    is RED (exit 1: "rejected: stale key-state notice — KSN is stale: seq 0 <
    last-seen 1; a verifier holding a newer state refuses to rewind"). The probe
    stood up the 3-witness fixture, had wit1 witness a full conformant inception
    (probes/fixtures/keri-icp.json — a real auths-signed icp), then GET
    /witness/<prefix>/key-state and (1) reconstructed the served record inside the
    pinned keripy oracle field-for-field (harness/ksn_oracle.py → ORACLE-OK), (2)
    ingested a keripy-emitted notice via `auths key-state --ingest`
    (harness/ksn_emit.py), (3) detected a stale (lower-seq) notice via
    `--reject-stale-below`. What landed in ../auths: the witness server now RETAINS
    the verified event body (auths-core witness storage `events` table) so it can
    replay an identity's KEL into current key-state, and serves it at a new stable
    endpoint GET /witness/{prefix}/key-state as a KERI KeyStateRecord (the
    {vn,i,s,p,d,f,dt,et,kt,k,nt,n,bt,b,c,ee,di} wire shape) — built only from
    auths_keri::KeyStateRecord::from_kel (the trust kernel, never hand-rolled);
    auths_keri::KeyStateRecord gained sequence()/check_not_stale() and the
    `auths key-state --ingest --reject-stale-below <hex>` flag composes it so a
    verifier holding a newer state fails closed on a rewind. Earlier same-day
    baseline (RED): against the pre-change node the endpoint did not exist —
    "ours=no-ksn-endpoint expected=served-notice … the node did not serve a
    key-state notice at /witness/<prefix>/key-state (curl exit 22)".
  adversarial_twin: 'a stale key-state notice (a lower sequence than a newer state the verifier holds) is detected as stale, never accepted — the stale-ksn trap stays RED'
  smallest_fix: >
    the witness server retains verified events and serves the current key-state as
    a KERI-conformant KeyStateRecord at a stable endpoint, replayed through the
    platform's own from_kel (zero hand-rolled protocol); the served record
    reconstructs byte-for-byte in the pinned keripy oracle and a keripy-published
    record ingests on the node; a stale (lower-seq) notice is detected as stale via
    a verifier-held last-seen sequence (auths_keri::KeyStateRecord::check_not_stale,
    exposed as `auths key-state --ingest --reject-stale-below`).
  probe: probes/wit-n3.sh
  unlocks: 'thin-client key-state trust; the directory freshness column — and the running node now backs IOP-L3c'

- id: WIT-N4
  title: 'the node proves what binary it runs (signed build attestation)'
  class: missing-surface
  status: closed
  severity: feature
  reads: cli
  covers: ["WIT-N4"]
  evidence:
    - PRD.md §FR-3 (the witness node carries a signed version/build attestation — the node proves what binary it runs, dogfooding `artifact sign --ci`)
    - 'Repo boundary (PRD §7): the attestation-signature check is protocol (must be correct for strangers) → it lives in auths-verifier; the node only self-measures + serves and the operator CLI only renders the verdict (WIT-B1)'
    - WIT-B2 (the build surface is additive — the witness-node feature stays one-way; no core crate depends on the node crate), WIT-B4 (standup deploys the released attested binary, never a source build)
  observed: >
    GREEN 2026-06-14: `NO_COLOR=1 bash probes/wit-n4.sh` → "the node proves which
    binary it runs: a live node served a signed version+digest build attestation,
    `witness status` verified it against the node's own self-measurement of the
    running binary, and a forged attestation (valid signature over a different
    binary) was rejected with a distinct reason — an operator vouching for the
    network is itself vouchable" (exit 0); the wrong-digest forged-attestation trap
    is RED (exit 1: "rejected: the attestation is for a different binary (attested
    296078e6…, running 7ce84d53…) — this node is not running what it attests"). The
    probe stands up its OWN throwaway node with a build attestation the harness
    produced over the RELEASED image's binary (extract /usr/local/bin/auths-witness
    from the image, dogfood `auths artifact sign --ci` over it), GET /build, asserts
    `auths witness status` verifies it, then stands a SECOND node up with an
    attestation signed over a DIFFERENT artifact and asserts `status` refuses — the
    forgery the claim exists to catch. What landed in ../auths: (1) the witness
    server measures its own running binary (sha256 of /proc/self/exe at startup) and
    serves a new BuildProof at GET /build pairing that self-measurement with the
    signed attestation (auths-core; the server interprets nothing — 404 when no
    attestation was configured, so a node that cannot prove its binary says so
    plainly); (2) the offline build-attestation check is in the PUBLIC verifier
    (auths_verifier::verify_build_attestation_offline) — two-leg, fail-closed: the
    signature verifies against the key its self-describing did:key issuer embeds AND
    the attested digest equals the node's self-measured running digest, so a valid
    signature over the WRONG binary lands on DigestMismatch, never Verified; (3) the
    node crate composes it as BuildAttestation::verify → NodeBuildVerdict and `auths
    witness status` fetches /build and renders the verdict, failing closed on a
    forged or absent build; (4) `auths witness up --build-attestation <path>`
    injects the attestation into the standup compose (read-only bind + env), and the
    auths-witness binary reads AUTHS_WITNESS_BUILD_ATTESTATION at boot. Earlier
    baseline (RED, same day): against the pre-change node the endpoint did not exist
    and `status` had no build leg — "ours=no-build-endpoint expected=served-proof —
    the node did not serve a build attestation at /build (curl exit 22)".
  adversarial_twin: 'an attestation whose digest differs from the running binary fails verification — a forged (different-binary) attestation is rejected by `status` with a distinct reason; the wrong-digest trap stays RED'
  smallest_fix: >
    the witness server measures its own running binary (sha256 of /proc/self/exe at
    startup) and serves it paired with the operator's signed `auths artifact sign
    --ci` attestation at GET /build; the offline check lives in the PUBLIC verifier
    (auths_verifier::verify_build_attestation_offline) — fail-closed two-leg: the
    signature verifies against the issuer's embedded key AND the attested digest
    equals the self-measured running digest, so a valid signature over a different
    binary fails on DigestMismatch. `auths witness status` composes it and renders
    the verdict; `auths witness up --build-attestation` injects the attestation at
    standup. The witness-node feature stays additive; no protocol is hand-rolled.
  probe: probes/wit-n4.sh
  unlocks: 'operators vouching for the network must be vouchable themselves — and standup (WIT-B4) can refuse a node whose binary does not verify'

- id: WIT-N5
