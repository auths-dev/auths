  class: missing-surface
  status: open
  severity: headline
  reads: none
  covers:
  - '4'
  evidence:
  - ../murmur — the SwiftUI multiplatform skeleton (iOS + macOS schemes) exists and embeds
    murmur-core through the UniFFI bridge; this probe asserts both app schemes BUILD clean
    under xcodebuild and a headless launch-smoke boots the shell to a first frame with the
    engine answering
  observed: 'RED at baseline 2026-06-15: ours=builds-but-no-launch-proof expected=both-apps-launch
    — the app shells build (the sculpt gate runs the host test scheme), but no headless launch-smoke
    proves a boot-to-first-frame with the engine answering yet; APP-1 is open'
  smallest_fix: 'Keep the two native SwiftUI shells building clean under xcodebuild (the iOS
    app for the simulator, the macOS app for the host) from one multiplatform codebase, embedding
