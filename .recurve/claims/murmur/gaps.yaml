- id: ENC-5
  title: The untrusted relay cannot tamper, replay, or link — bit-flipped ciphertext fails
    AEAD, a replay is deduped, the envelope carries only a pairwise id
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - crates/murmur-core/src/relay.rs — MailboxStore.deposit fingerprints the opaque ciphertext
    (SHA-256, per mailbox) and drops a byte-identical replay; the fingerprint outlives a drain
  - crates/murmur-core/src/lib.rs — hold_relay_boundary drives all three properties end-to-end
    (tamper rejected by AEAD with a uniform error, replay deduped to one delivery, envelope scanned
    routing-only)
  - crates/murmur-relay/src/main.rs — the serve self-test's boundary leg prints aead-rejected +
    replay-deduped over a real sealed envelope
  observed: 'GREEN 2026-06-15: a bit-flipped ciphertext fails the recipient''s AEAD and is rejected
    with the same uniform error a wrong key produces (no padding/oracle); a byte-identical capture
    re-presented to the relay is deduped on a per-mailbox ciphertext fingerprint so the recipient
    drains exactly one copy; the relay-visible envelope carries only the pairwise mailbox id (body,
    sender address, and session key each scanned for and found absent). The trap (a captured run
    where a bit-flipped ciphertext was accepted) still turns the probe RED.'
  smallest_fix: 'Done: relay-side dedup (MailboxStore.deposit, SHA-256 over ciphertext, per mailbox,
    surviving a drain) drops a replay; the AEAD open already rejects a bit-flip with a uniform error
    (no oracle); the routing-only scan proves the envelope carries only a pairwise mailbox id. A
    tampered ciphertext that opened, or a replay delivered twice, fails the leg closed. TRAP probes/enc-5.trap/tamper-accepted/
    — a captured run where a bit-flipped ciphertext was accepted turns the probe RED.'
  probe: probes/enc-5.sh
  unlocks: The relay is dumb AND safe — tamper/replay/link all closed at the boundary.

- id: ENC-6
  title: Vetted implementation, used correctly — the wrapper passes libsignal's test vectors
    and a differential interop, and never reuses a key
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - 'crates/murmur-core/src/vetted.rs — the misuse-resistant wrapper''s self-test. Each audited
    primitive it composes is checked against a published known-answer vector (ChaCha20-Poly1305
    RFC 8439 sec 2.8.2; HKDF-SHA256 RFC 5869 TC1; HMAC-SHA256 RFC 4231 TC2; X25519 RFC 7748 sec
    5.2); an independent ReferenceRatchet (no shared code with the wrapper''s ratchet) decrypts a
    wrapper-sealed message (the differential/interop leg); OneTimePrekeyJar consumes-and-zeroizes
    so a prekey id is never drawn twice, and a 256-message ratchet run yields 256 distinct
    per-message keys'
  - 'crates/murmur-core/src/session.rs — Session.seal_with_key exposes the engine''s own AEAD
    framing so the AEAD vector is driven through the path the engine encrypts with, not a bare
    cipher'
  - 'crates/murmur-relay/src/main.rs — the serve self-test''s vetted leg prints
    libsignal-vectors-pass with the vector/interop/no-reuse counts; a vector miss, a
    reference-decrypt mismatch, or a reused key fails the leg (and the whole self-test) closed'
  observed: 'GREEN 2026-06-15: the misuse-resistant wrapper matched 4 official known-answer test
    vectors of the audited primitives it composes (AEAD/HKDF/HMAC/X25519), an independent reference
    Double-Ratchet — sharing no code with the wrapper — decrypted a message our ratchet sealed (the
    differential/interop leg), and 256 one-time prekeys + 256 per-message keys were each handed out
    exactly once (the no-reuse property: the jar consumes-and-zeroizes, every per-message ciphertext
    distinct). The trap (a captured run reusing a one-time prekey) still turns the probe RED.'
  smallest_fix: 'Done: crates/murmur-core/src/vetted.rs::prove_vetted runs three checks over the
    engine''s own code paths — official known-answer vectors for each composed primitive, an
    independent reference Double-Ratchet decrypt of a wrapper-sealed message, and a no-reuse property
    over one-time prekeys (OneTimePrekeyJar) and per-message ratchet keys. The relay serve leg prints
    libsignal-vectors-pass on success and fails closed on any vector miss / interop mismatch / key
    reuse. TRAP probes/enc-6.trap/key-reused/ — a captured run reusing a one-time prekey turns the
    probe RED.'
  probe: probes/enc-6.sh
  unlocks: Proof we use Signal CORRECTLY — battle-tested is the premise, never the proof.

