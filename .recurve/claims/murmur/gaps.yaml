- id: MSG-4
  title: A delegated device (the Mac) sends authenticated as the same root identity; revoking
    it stops the next message
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - 'the delegated-device chain is built — crates/murmur-core/src/delegation.rs models a
    DelegatedDevice (its own signing key + the root AID it sends as), a DelegationAnchor (the
    root''s signature over root-AID ‖ device-AID ‖ device-key, the iPhone anchoring the Mac''s
    delegated inception), a DeviceRevocation (the root''s signature clawing a device back),
    and a DelegationState (the witness-corroborated KEL-replay stand-in carrying the root key,
    the admitted anchors, and the revocations). resolve_device_to_root() resolves a device to
    the SAME root AID iff the device is anchored, its key matches the anchored key, and it is
    not revoked — a forged anchor/revocation is rejected at admission against the root key'
  - 'murmur-relay serve drives the leg hermetically (prove_delegated_device): the root anchors
    the Mac; the Mac seals a message stored-and-forwarded through the relay; the contact opens
    it (authenticating the Mac''s own signature) and resolves the Mac to the root AID
    (device=Mac, identity=root); the root then revokes the Mac and its NEXT message — still
    decrypting, still carrying a valid device signature — is rejected on resolve (clawback from
    the chain), never surfaced. it prints "device-as-root + revoked-rejected"; the trap
    (revoked-device-accepted) turns the probe RED'
  observed: 'GREEN at 2026-06-16: a delegated device verified as the same root identity, and
    its next message after revocation was rejected — clawback from the chain (murmur-relay
    0.1.3 device-as-root + revoked-rejected). The adversarial twin — a revoked device whose
    message still verified as the root — turns probes/msg-4.trap/revoked-device-accepted/ RED.
    The honest stale-served window (a contact who re-resolves from a relay cache rather than
    witness-corroborated state still has a window) is carried by RVK-1, not this claim.'
  smallest_fix: 'Resolve a delegated device to its root: open() must verify a message from
    a delegated device (the Mac) as the SAME root AID (device=Mac, identity=root), and after
    the root revokes that device its next message must FAIL to verify for every contact. Adversarial
    (the trap): a message from a revoked device must be rejected (clawback from the chain),
    not accepted. TRAP probes/msg-4.trap/revoked-device-accepted/ — a captured flow where
    a revoked device''s message still verified must turn the probe RED.'
  probe: probes/msg-4.sh
  unlocks: Multi-device on real hardware — send from the Mac as you; revoke it as a chain
    event.

- id: ENC-1
  title: The Signal session is rooted in a KERI-authenticated prekey bundle; a wrong-key bundle
    is rejected
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - the KERI-to-Signal join is built — crates/murmur-core/src/prekey.rs publishes a PrekeyBundle
    carrying a recipient's DISTINCT X25519 Signal identity key + signed prekey, signed by the
    recipient's AID current key; PrekeyBundle::verify_rooted verifies that signature against
    the key the AID resolves to (a directory/KEL-replay stand-in), rejects a wrong-/non-pre-committed-key
    bundle, and asserts key hygiene (no signing-to-DH reuse) — only then returning a RootedBundle
    capability that x3dh_initiator/x3dh_responder can agree a session over (verify-then-agree
    is enforced by the type, not by convention)
  - 'murmur-relay serve drives the join hermetically (deliver_rooted): a verified bundle roots
    an X3DH session and the message arrives authenticated, while a bundle signed by the wrong
    key is rejected before any Diffie-Hellman — it prints "bundle-verified-against-aid"; the
    trap (wrong-key-bundle) turns the probe RED'
  observed: 'GREEN at 2026-06-15: the session was rooted only in a prekey bundle verified against
    the recipient AID''s current key (a distinct Signal identity key — no signing-to-DH reuse);
    a wrong-key bundle was rejected before X3DH (the MITM the safety-number warning exists to
    catch). The relay binary self-tests publish → verify-against-AID → X3DH → seal → store-and-forward
    → drain → verify+decrypt and reports bundle-verified-against-aid; the type system makes
    X3DH unreachable without a prior verify_rooted. libsignal''s audited ratchet (forward secrecy,
    post-compromise healing) and the external-audit precondition remain later work.'
  smallest_fix: 'Before X3DH, verify the recipient''s signed prekey bundle against their AID''s
    current key (KEL replay); reject a bundle signed by a wrong or non-pre-committed key.
    Assert key hygiene: the AID key signs a distinct Signal identity key. Embed libsignal
    (audited Rust) behind a misuse-resistant wrapper — do NOT reimplement the crypto. Adversarial
    (the trap): a bundle signed by the wrong key must be rejected, closing the MITM the safety-number
    warning exists to catch. TRAP probes/enc-1.trap/wrong-key-bundle/ — a captured session
    rooted in a mis-signed bundle must turn the probe RED.'
  probe: probes/enc-1.sh
  unlocks: The join KERI-to-Signal — the session starts from keys you VERIFIED belong to that
    AID.

- id: ENC-2
  title: Forward secrecy holds across our wiring — a captured ciphertext cannot be decrypted
    from a later compromised state
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - the forward-secret symmetric ratchet is built — crates/murmur-core/src/ratchet.rs seeds a
    Ratchet chain from the X3DH root (a domain-separated HMAC bind) and, per message, runs the
    Double Ratchet's symmetric-key chain step (message_key = HMAC(chain_key, 0x01); chain_key' =
    HMAC(chain_key, 0x02)), zeroizing the spent message key on drop and the prior chain key on
    every advance. The chain KDF is one-way, so a state holding chain_key_n cannot reproduce any
    earlier message key — forward secrecy is a property of the chain alone, with no DH step
    (post-compromise healing remains its own later work)
  - 'murmur-relay serve drives the property hermetically (deliver_forward_secret): the Mac seals
    several authenticated messages over a ratcheted session that are store-and-forwarded through
    the relay; the first ciphertext is captured off the relay, the phone''s receiving chain is
    advanced past it, and the advanced (compromised) state cannot decrypt the captured early
    ciphertext — it prints "forward-secrecy-held". The trap (late-state-decrypts-old) turns the
    probe RED'
  observed: 'GREEN at 2026-06-15: a ciphertext captured off the relay could not be decrypted from
    a later, compromised receiving-chain state — its per-message key had been ratcheted past and
    the spent key zeroized; used message keys and the prior chain key are wiped on every advance.
    The relay binary self-tests seal-N → store-and-forward → drain → open-in-order → replay the
    captured early ciphertext against the advanced state (rejected) and reports forward-secrecy-held;
    murmur-core unit tests cover the chain (distinct per-message keys, the counter, replay/
    out-of-order rejection, tamper rejection). This is the symmetric half of the Double Ratchet;
    the DH half (post-compromise healing) and embedding libsignal''s audited ratchet behind a
    misuse-resistant wrapper remain later work, gated on the external-audit precondition.'
  smallest_fix: 'Integrate the Double Ratchet (via libsignal) so each message has forward
    secrecy and used message keys are zeroized. Adversarial (the trap): snapshot the session
    state at message N and fail to decrypt message N-k from it. TRAP probes/enc-2.trap/late-state-decrypts-old/
    — a captured run where a later compromised state decrypted an earlier ciphertext must
    turn the probe RED.'
  probe: probes/enc-2.sh
  unlocks: Per-message forward secrecy across OUR wiring, not just Signal's premise.

