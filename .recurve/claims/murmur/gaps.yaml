- id: WIT-1
  title: A forked KEL is rejected and a relay-suppressed / stale key-state is caught by the
    witness threshold — the continuity story's correctness root
  class: missing-surface
  status: open
  severity: headline
  reads: relay
  covers:
  - '2'
  - '3'
  evidence:
  - crates/murmur-core/src/trust.rs evaluate() fails closed NotBuilt — the KEL replay it would
    drive has no forked-KEL detection and no witness-threshold corroboration, so a malicious
    relay could serve a stale or forked key-state to suppress or fake a rotation
  - PRD §2 'binding mechanism' + §3.1 — benign-continuity's integrity DEPENDS on rejecting a
    forked KEL (two different rotations at the same sequence) and on the witness threshold catching
    a relay-suppressed/stale key-state; the launch-centralization asterisk is load-bearing here,
    not cosmetic
  observed: 'RED at baseline 2026-06-15: ours=feature-absent expected=fork-rejected+stale-caught
    — the forked-KEL detection + witness-threshold corroboration is unbuilt (murmur-relay 0.1.3:
    store-and-forward wire not built yet (the mailbox queue + pull/subscribe surface is the
    slice''s transport work)); WIT-1 is open'
  smallest_fix: 'Make the replay refuse a FORKED KEL (two different rotations claiming the same
    sequence number must be rejected, never silently last-writer-wins) and make a relay-suppressed
    / stale key-state FAIL the witness-threshold check (a key-state under the receipt threshold,
    or staler than a corroborated witness set, is not accepted as current). This is the single
    most important correctness dependency: MSG-2''s verified-continuation badge is only trustworthy
    if the key-state it replays is the one true witnessed log. Adversarial (the trap): a forked
    KEL accepted, or a stale/relay-suppressed key-state passed without witness corroboration,
    must fail. TRAP probes/wit-1.trap/forked-kel/ — a captured replay where a forked or stale
    key-state was accepted must turn the probe RED.'
  probe: probes/wit-1.sh
  unlocks: The correctness root of the whole continuity story — the badge means something only
    because the log under it is the one true witnessed log.

- id: RVK-1
  title: Revocation resolves from witness-corroborated key-state, not a relay's cache; the honest
    stale-served window is acknowledged
  class: missing-surface
  status: open
  severity: headline
  reads: relay
  covers:
  - '6'
  - '10'
  evidence:
  - crates/murmur-core/src/lib.rs open() fails closed NotBuilt — the sender-AID resolve has
    no notion of WHERE the key-state came from, so a revocation could be resolved from a relay''s
    stale cache instead of witness-corroborated state
  - 'PRD §6.5 — revocation is prevention-vs-detection, not an instant global kill: only as fast
    as each contact re-resolves, and only safe if they get witness-corroborated state; an offline
    or stale-served contact still has a window that must be disclosed, not hidden'
  observed: 'RED at baseline 2026-06-15: ours=feature-absent expected=revoked-rejected-from-corroborated+stale-window-disclosed
    — revocation resolution from witness-corroborated state is unbuilt (murmur-relay 0.1.3:
    store-and-forward wire not built yet (the mailbox queue + pull/subscribe surface is the
    slice''s transport work)); RVK-1 is open'
  smallest_fix: 'Resolve revocation from WITNESS-CORROBORATED key-state, never a relay''s cache:
    after the root revokes a delegated device, a contact re-resolving corroborated state must
    REJECT the device''s next message — and the honest stale-served window (an offline contact,
    or one served a relay''s stale cache) must be ACKNOWLEDGED in the verdict, never silently
    waved through as safe. This strengthens MSG-4''s clawback (PRD §6.5): clawback is detection,
    witness-dependent, not an instant global kill. Adversarial (the trap): a revoked device
    accepted from corroborated state, a relay cache trusted over the witnesses, or a hidden
    stale window, must fail. TRAP probes/rvk-1.trap/revoked-from-corroborated/ — a captured
    flow where a revoked device verified from corroborated state, or the stale window was hidden,
    must turn the probe RED.'
  probe: probes/rvk-1.sh
  unlocks: Revocation as honest detection — clawback from corroborated state, with the stale-served
    window disclosed rather than oversold as an instant kill.

