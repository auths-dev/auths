- id: UI-TRUST
  title: The trust state survives the material — the verified-continuation badge and the key-change
    warning hold WCAG AA behind glass, in every appearance, under Reduce Transparency + Motion
  class: security-tradeoff
  status: open
  severity: headline
  reads: none
  covers:
  - '5'
  - '10'
  evidence:
  - ../murmur Murmur/Sources/Shared/TrustTokens.swift — the token layer + the contrast math
    exist and the host gate proves AA, but the SUBJECTIVE judgement (does it read behind glass
    on a real backdrop, under Reduce Transparency / Reduce Motion on a real device) is not,
    and must not be, decided by a deterministic test
  observed: 'RED at baseline 2026-06-15: ours=aa-floor-only-no-operator-review expected=aa-floor+operator-confirmed
    — the deterministic contrast floor is met, but the SUBJECTIVE behind-glass judgement (under
    Reduce Transparency / Reduce Motion) is review-gated and not yet operator-confirmed; UI-TRUST
    is open (build it, screenshot it on a sim, leave it for review)'
  smallest_fix: 'REVIEW-GATED (security-tradeoff): build the trust badge so it reads unmistakably
    behind Liquid Glass on ANY backdrop, in light/dark/increased-contrast and under Reduce
    Transparency + Reduce Motion; the deterministic contrast math (the app''s gate scheme)
    proves the AA FLOOR, but the visual judgement is the operator''s to confirm by SIMULATING
    — never self-closed by a green gate. Build it, screenshot it on a booted simulator (allowed
    for this suite), and leave it for review. The probe asserts only the falsifiable floor
    (the opaque trust component holds AA) plus a recorded operator verdict; a green gate is
    necessary but NOT sufficient here. TRAP probes/ui-trust.trap/glass-dilutes-signal/ — a
    captured token set where glass dropped the trust signal below AA must turn the probe RED.'
  probe: probes/ui-trust.sh
  unlocks: Translucency never weakens a security signal — the messenger's analog of a clear
    verdict.

