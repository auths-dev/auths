# gaps.yaml — the live ledger: verified observations only.
# Entries arrive here through `baseline` (the promotion ceremony); the
# `observed` field quotes actual dated output, never a prediction.

- id: MSG-1
  title: A message is addressed to, and authenticated by, an AID — no phone number or email
    anywhere in the flow
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - 'crates/murmur-core/src/lib.rs prove_addressed() — seals a message addressed to the recipient
    AID''s pairwise mailbox, authenticated as the sender AID via Endpoint::seal_to/open (the
    signature verifies under the key the AID resolves to), proves it number-free, and rejects
    a forgery claiming an uncontrolled AID with CoreError::Rejected'
  - 'crates/murmur-core/src/number_free.rs prove_number_free() — scans the serialized Message
    and both envelopes and rejects any dialable number or email shape; AID strings are masked
    (a self-certifying identifier is an address, never a number), so a did:keri hex digit-run
    never false-trips while a number in the body still does'
  - crates/murmur-core/src/address.rs Aid — the address is a did:keri / did:webs string; no
    phone-number or email field exists in Message, by construction
  observed: 'GREEN 2026-06-16: ours=aid-authenticated+number-free expected=aid-authenticated+number-free
    — the relay self-test floor leg (murmur-relay run_addressed) seals a message addressed to
    a recipient AID via a pairwise mailbox, authenticated as the sender AID, scans the message
    and both envelopes free of any telco identifier, and rejects a forgery claiming an AID the
    sender does not control; trap msg-1.trap/unauthenticated turns the probe RED. MSG-1 closed'
  smallest_fix: 'Bind the sender: seal() must KERI-authenticate the sender AID (sign the Signal
    identity key with the AID''s current KERI key) and address the OuterEnvelope to the recipient
    AID''s pairwise mailbox — with NO phone number or email anywhere in Message or the envelope.
    Adversarial (the trap): a message claiming an AID the sender does not control must be
    REJECTED (CoreError::Rejected), never surfaced as authenticated. TRAP probes/msg-1.trap/unauthenticated/
    — a captured flow where a message from an uncontrolled AID was accepted as authentic must
    turn the probe RED.'
  probe: probes/msg-1.sh
  unlocks: The floor — a message can be addressed to and authenticated by an AID at all (no
    number).

- id: MSG-2
  title: A contact's key rotation verifies as a pre-committed continuation of the same identity;
    a substituted key is rejected
  class: missing-surface
  status: closed
  severity: headline
  reads: relay
  covers:
  - '10'
  evidence:
  - 'crates/murmur-core/src/rotation.rs — KeyState carries the stable AID + the current key +
    the pre-rotation commitment to the next key; verify_continuation(prior, current) runs the
    commitment check (the revealed current key must hash to the prior state''s next_commitment)
    and yields VerifiedContinuation for a pre-committed rotation, NonContinuationWarning for a
    substituted key — never a soft re-pin'
  - 'crates/murmur-core/src/rotation.rs verified_rotation_rekey() drives the §2 binding mechanism:
    on a verified continuation it re-keys the Signal session by re-running X3DH against the
    freshly-replayed key-state (asserting the re-keyed root differs from the prior session''s —
    the old ratchet is NOT continued across the change) and re-verifies the republished prekey
    bundle against the new current key (a stale-signer bundle signed by the superseded key is
    rejected)'
  - 'crates/murmur-core/src/trust.rs evaluate() now decodes two KeyState snapshots and returns
    the verify_continuation verdict — the three TrustStates are produced by a real commitment
    check, not modelled-but-never-produced'
  - 'crates/murmur-relay/src/main.rs run_continuation() self-test prints the markers the probe
    greps for — verified-continuation + session-rekeyed + prekey-reverified — and fails the
    serve closed if the substituted-key twin is re-pinned, the session is not re-keyed, or a
    stale-signer prekey is accepted'
  observed: 'GREEN at 2026-06-16: a pre-committed rotation verified as a continuation of the same
    identity; the Signal session was re-keyed against the freshly-replayed key-state (the old
    ratchet was not continued across the change) and the republished prekey was re-verified
    against the fresh current key; a substituted key the prior state never pre-committed to was
    warned (NonContinuationWarning), not re-pinned. Probe GREEN, trap probes/msg-2.trap/substituted-key/
    still RED (substituted/stale-signer acceptance turns it RED), federated gate OK, leakcheck clean'
  smallest_fix: 'Wire evaluate() to replay the contact''s KEL and run the pre-rotation commitment
    check (verify the new key was pre-committed by the prior key-state): a pre-committed rotation
    yields VerifiedContinuation; a substituted (not-pre-committed) key yields NonContinuationWarning,
    NOT a soft re-pin. STRENGTHENED (PRD §2 binding mechanism — these are load-bearing, not
    cosmetic): on a verified rotation the app must RE-KEY the Signal session deterministically
    — tear down and re-establish X3DH against the freshly-replayed key-state, NEVER continue
    the old ratchet across an identity change — AND re-verify the republished prekey bundle
    against the freshly-replayed CURRENT key (accepting a bundle whose signer you did not re-check
    is the dangerous bug). Adversarial (the trap): a substituted key a pinning model would wave
    through as a mere warning must yield NonContinuationWarning here; AND the old ratchet must
    never be continued across an identity change, and a stale-signer prekey must never be accepted.
    TRAP probes/msg-2.trap/substituted-key/ — a captured rotation where a non-pre-committed key
    verified as a continuation, where the ratchet was continued across an identity change, or
    where a stale-signer prekey was accepted, must turn the probe RED.'
  probe: probes/msg-2.sh
  unlocks: The wedge — verifiable key continuity (pre-rotation) no pinning model can match.

