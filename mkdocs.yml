site_name: Auths
site_description: Decentralized identity for developers. One identity, multiple devices, Git-native storage.
site_url: https://docs.auths.dev
repo_url: https://github.com/auths-dev/auths
repo_name: auths-dev/auths

theme:
  name: material
  custom_dir: overrides
  logo: images/logo.png
  # favicon: assets/favicon.ico  # TODO: Add favicon
  palette:
    # Dark Mode (default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light Mode
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.prune
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/auths-python/python]
          options:
            docstring_style: google
            docstring_section_style: list
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            show_if_no_docstring: false
            group_by_category: true
            heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - footnotes
  - abbr
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/auths-dev/auths

nav:
  - Home: index.md

  - Getting Started:
      - Installation: getting-started/install.md
      - Your First Identity: getting-started/your-first-identity.md
      - Signing Commits: getting-started/signing-commits.md
      - Sharing Your Identity: getting-started/sharing-your-identity.md
      - How It Works: getting-started/how-it-works.md
      - Identity Lifecycle: getting-started/identity-lifecycle.md
      - Delegation: getting-started/delegation.md
      - Trust Model: getting-started/trust-model.md

  - Guides:
      - Identity Management:
          - Multi-Device: guides/identity/multi-device.md
          - Key Rotation: guides/identity/key-rotation.md
          - Backup & Recovery: guides/identity/backup-and-recovery.md
          - Profiles: guides/identity/profiles.md
      - Git Integration:
          - Signing Configuration: guides/git/signing-configuration.md
          - Verifying Commits: guides/git/verifying-commits.md
          - Team Workflows: guides/git/team-workflows.md
      - Platform Integrations:
          - GitHub Claims: guides/platforms/github-claims.md
          - Radicle: guides/platforms/radicle.md
          - CI/CD: guides/platforms/ci-cd.md
      - Advanced:
          - Custom Policies: guides/advanced/custom-policies.md
          - WASM Verification: guides/advanced/wasm-verification.md

  - CLI:
      - Primary Commands: cli/commands/primary.md
      - Advanced Commands: cli/commands/advanced.md

  - SDK & Libraries:
      - Python SDK:
          - Overview: sdk/python/overview.md
          - Quickstart: sdk/python/quickstart.md
          - API Reference:
              - Client: sdk/python/api/client.md
              - Identities: sdk/python/api/identities.md
              - Devices: sdk/python/api/devices.md
              - Organizations: sdk/python/api/orgs.md
              - Attestations: sdk/python/api/attestations.md
              - Git: sdk/python/api/git.md
              - Policy: sdk/python/api/policy.md
              - JWT: sdk/python/api/jwt.md
              - Verification: sdk/python/api/verification.md
              - Signing: sdk/python/api/signing.md
              - Agent Auth: sdk/python/api/agent.md
          - Errors: sdk/python/errors.md
      - Node SDK:
          - Overview: sdk/node/overview.md
          - Quickstart: sdk/node/quickstart.md
          - API Reference:
              - All: sdk/node/api/index.md
          - Error Handling: sdk/node/errors.md
      - Rust SDK:
          - Overview: sdk/rust/overview.md
          - Quickstart: sdk/rust/quickstart.md
          - Identity Operations: sdk/rust/identity-operations.md
          - Signing & Verification: sdk/rust/signing-and-verification.md
          - Error Handling: sdk/rust/error-handling.md
          - Storage Backends: sdk/rust/storage-backends.md
          - API Reference: sdk/rust/api-reference.md
      - Verifier Embedding:
          - FFI (C/C++): sdk/verifier/ffi.md
          - WASM: sdk/verifier/wasm.md
          - Python: sdk/verifier/python.md
      - API Reference: sdk/crate-index.md

  - Architecture:
      - Design:
          - Overview: architecture/overview.md
          - Identity Model: architecture/identity-model.md
          - Git as Storage: architecture/git-as-storage.md
          - Attestation Format: architecture/attestation-format.md
          - OIDC Bridge: architecture/oidc-bridge.md
          - Cryptography: architecture/cryptography.md
      - Crate Deep Dives:
          - auths-core: architecture/crates/auths-core.md
          - auths-id: architecture/crates/auths-id.md
          - auths-verifier: architecture/crates/auths-verifier.md
          - auths-sdk: architecture/crates/auths-sdk.md


