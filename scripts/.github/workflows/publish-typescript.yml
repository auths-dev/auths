name: Publish TypeScript SDK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Pin to 0.12.1 — the last release before wasm-pack started passing
      # cargo's --out-dir flag directly, which was renamed to --artifact-dir
      # in Rust 1.80+ and is unstable-only on the stable channel.
      # See: https://github.com/rustwasm/wasm-pack/issues/1501
      - name: Install wasm-pack
        run: cargo install wasm-pack --version "=0.12.1" --locked

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/auths-verifier-ts
        run: npm install

      - name: Build
        working-directory: packages/auths-verifier-ts
        run: npm run build

      - name: Publish
        working-directory: packages/auths-verifier-ts
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
