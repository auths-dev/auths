name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure allowed types
          types: |
            feat
            fix
            docs
            chore
            test
            refactor
            style
            perf
            build
            ci
            revert
          # Require scope to be lowercase
          requireScope: false
          # Allow scopes (optional)
          scopes: |
            core
            cli
            id
            index
            verifier
            nostr
            storage
            attestation
            identity
            deps
            ci
          # Ensure the subject doesn't start with uppercase
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" should not start with an uppercase letter.
            Please use lowercase (e.g., "add feature" not "Add feature").
