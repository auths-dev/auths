name: Rust CI Checks

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      # Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure git for tests that need user.name/email
      - name: Configure git
        run: |
          git config --global user.name "CI Test User"
          git config --global user.email "ci@example.com"

      # Setup Rust environment (uses rust-toolchain.toml)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      # Cache dependencies
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      # Check formatting (Syntax/Style) - only on Ubuntu to avoid duplicates
      - name: Check Formatting (cargo fmt)
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check --all

      # Lint code (Syntax/Style/Correctness)
      - name: Linting Checks (cargo clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Install cargo-nextest for faster test execution
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      # Run all tests (unit + integration) via nextest.
      - name: Run Tests (nextest)
        run: cargo nextest run --workspace --all-features --profile ci

      # Doc tests must run separately (nextest doesn't support them).
      - name: Run Doc Tests
        run: cargo test --workspace --doc

      # Windows-specific: Test with keychain-windows feature
      - name: Test Windows Credential Manager feature
        if: matrix.os == 'windows-latest'
        run: cargo check --package auths_core --features keychain-windows

      # Check for security vulnerabilities (Security) - only on Ubuntu
      - name: Install/Run cargo-audit
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit --locked --force
          cargo audit

  # WASM build verification (separate job)
  wasm-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with WASM target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown
          cache-on-failure: true

      # Check that auths-verifier compiles for wasm32-unknown-unknown.
      # Note: auths-core is NOT WASM-compatible (tokio, ssh-agent-lib, platform keychains).
      #
      # Run from inside the crate directory, not the workspace root.
      # Both `--features wasm` and `--features auths_verifier/wasm` fail from
      # the workspace root under resolver = "3" with "cannot specify features
      # for packages outside of workspace". cd sidesteps this entirely.
      - name: Check WASM build (auths-verifier)
        run: cd crates/auths-verifier && cargo check --target wasm32-unknown-unknown --features wasm

  # Code coverage (separate job, Ubuntu only)
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "CI Test User"
          git config --global user.email "ci@example.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          components: llvm-tools-preview

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Mobile FFI crates (independent workspaces, not in main workspace)
  mobile-ffi:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "CI Test User"
          git config --global user.email "ci@example.com"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"

      - name: Cache mobile-ffi dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: mobile-ffi
          workspaces: |
            crates/auths-mobile-ffi
          cache-on-failure: true

      - name: Test auths-mobile-ffi
        working-directory: crates/auths-mobile-ffi
        run: cargo test --verbose
